<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚡ Angle Arena · Boys vs Girls</title>
  <!-- Font & icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #0d1b2a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 12px;
    }

    .game-container {
      max-width: 1400px;
      width: 100%;
      background: linear-gradient(145deg, #1b2f44, #152433);
      border-radius: 60px 60px 40px 40px;
      padding: 24px 28px 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 2px 4px rgba(255,215,0,0.2);
      border: 1px solid #f1c40f50;
      backdrop-filter: blur(2px);
    }

    /* scoreboard */
    .scoreboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0b1622cc;
      border-radius: 80px;
      padding: 12px 28px;
      margin-bottom: 18px;
      backdrop-filter: blur(4px);
      border: 1px solid #f1c40f30;
      color: #ecf0f1;
      font-weight: 700;
      font-size: 1.6rem;
      text-shadow: 0 2px 3px black;
      flex-wrap: wrap;
    }

    .team-badge {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .team-badge i {
      font-size: 2.2rem;
      filter: drop-shadow(0 0 6px gold);
    }

    .boys-badge i { color: #3498db; }
    .girls-badge i { color: #e84393; }

    .score-number {
      background: #1e2f3f;
      padding: 6px 24px;
      border-radius: 60px;
      border: 1px solid #f1c40f;
      color: #f7f9fc;
      font-size: 2rem;
      min-width: 110px;
      text-align: center;
      letter-spacing: 2px;
    }

    .score-number.boys-score { border-color: #3498db; box-shadow: 0 0 12px #3498db80; }
    .score-number.girls-score { border-color: #e84393; box-shadow: 0 0 12px #e8439380; }

    /* question & diagram */
    .question-area {
      background: #0d1b2aee;
      border-radius: 48px;
      padding: 20px 24px 24px;
      margin-bottom: 20px;
      border: 1px solid #f1c40f40;
      box-shadow: inset 0 0 30px #00000099;
      backdrop-filter: blur(2px);
    }

    .diagram-placeholder {
      background: #1b2f41;
      border-radius: 32px;
      padding: 18px;
      margin-bottom: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 180px;
      border: 2px dashed #f1c40f60;
      font-size: 1.8rem;
      color: #b0c7d9;
      text-align: center;
    }

    .diagram-placeholder i {
      font-size: 4rem;
      margin-right: 16px;
      color: #f1c40f;
    }

    .question-text {
      color: #ecf0f1;
      font-size: 1.7rem;
      font-weight: 600;
      text-align: center;
      padding: 10px 0 6px;
      background: #0f1f2e;
      border-radius: 60px;
      border: 1px solid #f1c40f30;
    }

    /* two-team choices row */
    .team-choices-wrapper {
      display: flex;
      flex-direction: row;
      gap: 30px;
      margin: 22px 0 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .team-choice-group {
      flex: 1 1 300px;
      background: #122433cc;
      border-radius: 40px;
      padding: 16px 12px 20px;
      border: 2px solid #4a6679;
      backdrop-filter: blur(2px);
    }

    .team-choice-group.boys-group {
      border-color: #3498db;
      box-shadow: 0 0 15px #3498db40;
    }

    .team-choice-group.girls-group {
      border-color: #e84393;
      box-shadow: 0 0 15px #e8439340;
    }

    .team-label {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ecf0f1;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .team-label i {
      font-size: 1.8rem;
    }

    .choices-grid {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .choice-btn {
      background: #1d3347;
      padding: 14px 18px;
      border-radius: 60px;
      border: 3px solid #4a6679;
      color: white;
      font-size: 1.3rem;
      font-weight: 600;
      min-width: 100px;
      cursor: pointer;
      transition: all 0.1s ease;
      box-shadow: 0 6px 0 #0a141f;
      text-shadow: 0 2px 2px black;
      letter-spacing: 0.5px;
      flex: 1 0 auto;
      max-width: 160px;
      text-align: center;
    }

    .choice-btn:hover:not(.disabled-choice) {
      transform: scale(1.02);
      background: #2c4a62;
      border-color: #f1c40f;
    }

    .choice-btn:active:not(.disabled-choice) {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0a141f;
    }

    .choice-btn.disabled-choice {
      opacity: 0.45;
      filter: grayscale(0.6);
      cursor: not-allowed;
      transform: scale(0.97);
      border-color: #4f5f6b;
      pointer-events: none;
    }

    .choice-btn.correct-highlight {
      background: #2ecc71;
      border-color: #f1c40f;
      box-shadow: 0 0 20px #2ecc71aa;
    }

    .choice-btn.wrong-highlight {
      background: #e74c3c;
      border-color: #c0392b;
      box-shadow: 0 0 20px #e74c3caa;
    }

    .choice-btn.team-winner {
      box-shadow: 0 0 25px gold, 0 0 50px gold;
      border-color: gold;
      transform: scale(1.05);
    }

    /* bar score */
    .bar-score-section {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 16px 0 10px;
    }

    .bar-score-btn {
      background: #f1c40f;
      padding: 14px 40px;
      border-radius: 20px;
      border: none;
      font-size: 2rem;
      font-weight: 800;
      color: #0d1b2a;
      box-shadow: 0 10px 0 #9e7d0e, 0 0 20px #f1c40f60;
      cursor: pointer;
      transition: 0.08s linear;
      text-transform: uppercase;
      letter-spacing: 3px;
      min-width: 220px;
      border: 2px solid #ffe484;
    }

    .bar-score-btn:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #9e7d0e;
    }

    .bar-score-btn.hidden-bar {
      display: none;
    }

    .next-btn {
      background: #2c3e50;
      border: 2px solid #f1c40f;
      color: white;
      padding: 12px 36px;
      border-radius: 60px;
      font-size: 1.5rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      margin: 10px auto 0;
      display: inline-block;
      box-shadow: 0 6px 0 #0f1a24;
      letter-spacing: 2px;
    }

    .next-btn:hover {
      background: #1f3345;
      border-color: #f39c12;
      transform: scale(1.02);
    }

    .next-btn:active {
      transform: translateY(6px);
      box-shadow: 0 0px 0 #0f1a24;
    }

    .flex-center {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .timer-badge {
      background: #2c3e50;
      padding: 6px 22px;
      border-radius: 80px;
      color: #f1c40f;
      font-size: 1.5rem;
      font-weight: 700;
      border: 1px solid #f1c40f60;
    }

    .status-msg {
      color: #f1c40f;
      font-size: 1.2rem;
      text-align: center;
      margin-top: 6px;
      font-weight: 600;
      min-height: 2.2rem;
    }

    .footnote {
      color: #95a5a6;
      text-align: center;
      margin-top: 10px;
      font-size: 0.9rem;
    }

    @media (max-width: 850px) {
      .game-container { padding: 16px; }
      .choice-btn { font-size: 1.1rem; min-width: 75px; padding: 10px 8px; }
      .score-number { font-size: 1.4rem; min-width: 70px; }
      .bar-score-btn { font-size: 1.4rem; padding: 10px 20px; min-width: 150px; }
      .team-choice-group { flex: 1 1 200px; }
    }
  </style>
</head>
<body>
<div class="game-container" id="gameApp">
  <!-- scoreboard -->
  <div class="scoreboard">
    <div class="team-badge boys-badge"><i class="fas fa-mars"></i> BOYS <span class="score-number boys-score" id="boysScore">0</span></div>
    <div class="timer-badge"><i class="fas fa-hourglass-half"></i> <span id="timerDisplay">20</span>s</div>
    <div class="team-badge girls-badge"><i class="fas fa-venus"></i> GIRLS <span class="score-number girls-score" id="girlsScore">0</span></div>
  </div>

  <!-- question block -->
  <div class="question-area" id="questionArea">
    <div class="diagram-placeholder" id="diagramPlaceholder">
      <i class="fas fa-image"></i> [Diagram] Q<sup>#</sup>
    </div>
    <div class="question-text" id="questionText">Loading question...</div>

    <!-- two groups: boys & girls choices -->
    <div class="team-choices-wrapper">
      <!-- BOYS group -->
      <div class="team-choice-group boys-group" id="boysGroup">
        <div class="team-label"><i class="fas fa-mars" style="color:#3498db;"></i> BOYS</div>
        <div class="choices-grid" id="boysChoices">
          <button class="choice-btn" data-team="boys" data-choice="a">A</button>
          <button class="choice-btn" data-team="boys" data-choice="b">B</button>
          <button class="choice-btn" data-team="boys" data-choice="c">C</button>
        </div>
      </div>
      <!-- GIRLS group -->
      <div class="team-choice-group girls-group" id="girlsGroup">
        <div class="team-label"><i class="fas fa-venus" style="color:#e84393;"></i> GIRLS</div>
        <div class="choices-grid" id="girlsChoices">
          <button class="choice-btn" data-team="girls" data-choice="a">A</button>
          <button class="choice-btn" data-team="girls" data-choice="b">B</button>
          <button class="choice-btn" data-team="girls" data-choice="c">C</button>
        </div>
      </div>
    </div>

    <!-- status message -->
    <div class="status-msg" id="statusMsg">⏳ Waiting for answers...</div>

    <!-- bar score -->
    <div class="bar-score-section">
      <button class="bar-score-btn" id="barScoreBtn">🎲 PRESS FOR SCORE</button>
    </div>

    <!-- next button -->
    <div class="flex-center">
      <button class="next-btn" id="nextBtn"><i class="fas fa-forward"></i> NEXT QUESTION</button>
    </div>
  </div>
  <div class="footnote"><i class="fas fa-bolt"></i> each team taps its own choices · first correct wins</div>
</div>

<script>
  (function() {
    // ----- all 15 questions -----
    const questions = [
      { q: "1) Name the part of protractor indicated by the arrow.", choices: ["a) a center mark", "b) a degree mark", "c) zero edges"], answer: 0, difficulty: "easy" },
      { q: "2) Name the part of protractor indicated by the arrow.", choices: ["a) a center mark", "b) a degree mark", "c) zero edges"], answer: 1, difficulty: "easy" },
      { q: "3) Name the part of protractor indicated by the arrow.", choices: ["a) a center mark", "b) a degree mark", "c) zero edges"], answer: 2, difficulty: "easy" },
      { q: "4) Name the angle.", choices: ["a) PQ̂R", "b) RP̂Q", "c) QR̂P"], answer: 0, difficulty: "easy" },
      { q: "5) Name the vertex.", choices: ["a) Dot N", "b) Angle N", "c) Point N or .N"], answer: 2, difficulty: "easy" },
      { q: "6) Name the arms.", choices: ["a) (CH)̅ and (CK)̅", "b) (HC)⃗ and (KC)⃗", "c) (CH)⃗ and (CK)⃗"], answer: 2, difficulty: "average" },
      { q: "7) ……. is an angle measures bigger than 0° but smaller than 90°", choices: ["a) Acute angle", "b) Right angle", "c) Obtuse angle"], answer: 0, difficulty: "easy" },
      { q: "8) What type of angle is shown in the diagram?", choices: ["a) Acute angle", "b) Right angle", "c) Obtuse angle"], answer: 1, difficulty: "easy" },
      { q: "9) What type of angle is SÛN = 150° ?", choices: ["a) Acute angle", "b) Right angle", "c) Obtuse angle"], answer: 2, difficulty: "average" },
      { q: "10) ……. is an angle measures exactly 180°", choices: ["a) Right angle", "b) Obtuse angle", "c) Straight angle"], answer: 2, difficulty: "average" },
      { q: "11) Look at the figure. How many acute angles are there?", choices: ["a) 1", "b) 2", "c) 3"], answer: 1, difficulty: "average" },
      { q: "12) Look at the figure. How many right angles?", choices: ["a) 3", "b) 12", "c) 14"], answer: 1, difficulty: "difficult" },
      { q: "13) Measure and read the angle shown in the diagram.", choices: ["a) 50°", "b) 105°", "c) 165°"], answer: 1, difficulty: "difficult" },
      { q: "14) Find angle b̂.", choices: ["a) 30°", "b) 42°", "c) 52°"], answer: 1, difficulty: "difficult" },
      { q: "15) Find angle â.", choices: ["a) 144°", "b) 180°", "c) 324°"], answer: 0, difficulty: "difficult" }
    ];

    // ----- state -----
    let currentIndex = 0;
    let boysScore = 0;
    let girlsScore = 0;
    let timerInterval = null;
    let timeLeft = 20;
    let roundActive = false;          // can teams tap?
    let roundFinished = false;        // answer revealed
    let winningTeam = null;           // 'boys' or 'girls' or null
    let barRevealed = false;
    let barScoreValue = 0;

    // DOM refs
    const boysScoreEl = document.getElementById('boysScore');
    const girlsScoreEl = document.getElementById('girlsScore');
    const questionText = document.getElementById('questionText');
    const diagramPlaceholder = document.getElementById('diagramPlaceholder');
    const timerDisplay = document.getElementById('timerDisplay');
    const barBtn = document.getElementById('barScoreBtn');
    const nextBtn = document.getElementById('nextBtn');
    const statusMsg = document.getElementById('statusMsg');

    // all choice buttons (both teams)
    const allChoiceBtns = document.querySelectorAll('.choice-btn');

    // team containers
    const boysChoices = document.querySelectorAll('#boysChoices .choice-btn');
    const girlsChoices = document.querySelectorAll('#girlsChoices .choice-btn');

    // ----- helpers -----
    function speakText(text) {
      if (!window.speechSynthesis) return;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.9;
      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
    }

    function playBeep(type) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        if (type === 'correct') {
          osc.frequency.value = 880;
          gain.gain.value = 0.3;
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.2);
        } else if (type === 'wrong') {
          osc.frequency.value = 300;
          gain.gain.value = 0.25;
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.35);
        } else if (type === 'victory') {
          osc.frequency.value = 523;
          gain.gain.value = 0.3;
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.18);
          setTimeout(() => {
            const osc2 = ctx.createOscillator();
            const gain2 = ctx.createGain();
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.frequency.value = 659;
            gain2.gain.value = 0.3;
            osc2.start(ctx.currentTime);
            osc2.stop(ctx.currentTime + 0.2);
          }, 200);
        } else if (type === 'timer') {
          osc.frequency.value = 600;
          gain.gain.value = 0.15;
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.1);
        }
      } catch (_) {}
    }

    function updateScores() {
      boysScoreEl.textContent = boysScore;
      girlsScoreEl.textContent = girlsScore;
    }

    // reset all choice buttons (both teams)
    function resetChoices() {
      allChoiceBtns.forEach(btn => {
        btn.classList.remove('disabled-choice', 'correct-highlight', 'wrong-highlight', 'team-winner');
        btn.disabled = false;
      });
    }

    // disable all choices
    function disableAllChoices() {
      allChoiceBtns.forEach(btn => {
        btn.classList.add('disabled-choice');
        btn.disabled = true;
      });
    }

    // highlight correct/wrong for a specific team's buttons
    function highlightTeamChoices(team, correctIdx, wrongIdx = null) {
      const btns = team === 'boys' ? boysChoices : girlsChoices;
      btns.forEach((btn, idx) => {
        if (idx === correctIdx) {
          btn.classList.add('correct-highlight');
        } else if (idx === wrongIdx) {
          btn.classList.add('wrong-highlight');
        }
        btn.classList.add('disabled-choice');
        btn.disabled = true;
      });
    }

    // load question
    function loadQuestion(index) {
      // reset state
      roundActive = true;
      roundFinished = false;
      winningTeam = null;
      barRevealed = false;
      barBtn.classList.remove('hidden-bar');
      barBtn.textContent = '🎲 PRESS FOR SCORE';
      statusMsg.textContent = '⏳ Waiting for answers...';
      resetChoices();

      const q = questions[index];
      if (!q) return;
      questionText.textContent = q.q;
      diagramPlaceholder.innerHTML = `<i class="fas fa-image"></i> [Diagram] Q${index+1}`;

      // set choices text for both teams
      const allBtns = document.querySelectorAll('.choice-btn');
      allBtns.forEach((btn, idx) => {
        const choiceIndex = idx % 3; // a,b,c
        btn.innerHTML = q.choices[choiceIndex] || '---';
      });

      // timer
      let maxTime = 15;
      if (q.difficulty === 'average') maxTime = 20;
      else if (q.difficulty === 'difficult') maxTime = 30;
      timeLeft = maxTime;
      timerDisplay.textContent = timeLeft;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft -= 1;
        timerDisplay.textContent = timeLeft;
        if (timeLeft <= 3) playBeep('timer');
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          timerDisplay.textContent = '⏰';
          // time's up: if not finished, reveal correct answer
          if (!roundFinished) {
            roundActive = false;
            roundFinished = true;
            disableAllChoices();
            const correctIdx = q.answer;
            // highlight correct on both teams
            boysChoices.forEach((btn, idx) => {
              if (idx === correctIdx) btn.classList.add('correct-highlight');
              btn.classList.add('disabled-choice');
              btn.disabled = true;
            });
            girlsChoices.forEach((btn, idx) => {
              if (idx === correctIdx) btn.classList.add('correct-highlight');
              btn.classList.add('disabled-choice');
              btn.disabled = true;
            });
            statusMsg.textContent = '⏰ Time is up! No one scored.';
            speakText('Time is up');
            // bar still available but no team wins
            winningTeam = null;
            // but we still show bar? we allow bar press but no team add? we'll handle
          }
        }
      }, 1000);
    }

    // handle team choice click
    function onChoiceClick(e) {
      const btn = e.currentTarget;
      if (!roundActive || roundFinished || btn.classList.contains('disabled-choice')) return;

      const team = btn.dataset.team; // 'boys' or 'girls'
      const choiceLetter = btn.dataset.choice; // 'a','b','c'
      const choiceIdx = choiceLetter.charCodeAt(0) - 97; // 0,1,2
      const q = questions[currentIndex];
      const isCorrect = (choiceIdx === q.answer);

      // voice: say the choice letter + text
      const letter = choiceLetter.toUpperCase();
      let voiceText = letter + '. ' + q.choices[choiceIdx];
      speakText(voiceText);

      // if correct
      if (isCorrect) {
        // if no winner yet, this team wins
        if (!winningTeam) {
          winningTeam = team;
          roundActive = false;
          roundFinished = true;
          playBeep('correct');
          speakText('Correct!');
          statusMsg.textContent = `🏆 ${team.toUpperCase()} wins this round!`;

          // highlight correct on winner, show correct on both teams but winner gets gold glow
          const winnerBtns = team === 'boys' ? boysChoices : girlsChoices;
          const loserBtns = team === 'boys' ? girlsChoices : boysChoices;

          // winner: highlight correct + team-winner glow
          winnerBtns.forEach((b, idx) => {
            b.classList.add('disabled-choice');
            b.disabled = true;
            if (idx === q.answer) {
              b.classList.add('correct-highlight', 'team-winner');
            }
          });
          // loser: show correct answer but no glow
          loserBtns.forEach((b, idx) => {
            b.classList.add('disabled-choice');
            b.disabled = true;
            if (idx === q.answer) {
              b.classList.add('correct-highlight');
            }
          });

          playBeep('victory');
          // show bar for score
          // bar will be available
          barBtn.classList.remove('hidden-bar');
          barBtn.textContent = '🎲 PRESS FOR SCORE';
        } else {
          // already a winner, block everything
          roundActive = false;
          roundFinished = true;
          disableAllChoices();
          statusMsg.textContent = `⛔ Already answered by ${winningTeam.toUpperCase()}`;
        }
      } else {
        // wrong: highlight wrong on that team's button only
        btn.classList.add('wrong-highlight', 'disabled-choice');
        btn.disabled = true;
        playBeep('wrong');
        speakText('Wrong');
        // check if all buttons of that team are disabled? optional
      }
    }

    // bar score click
    function onBarClick() {
      if (barRevealed) return;
      if (!roundFinished) {
        statusMsg.textContent = '⏳ Wait for the round to finish!';
        speakText('Wait for the round to finish');
        return;
      }
      // if no winningTeam (timeout) we can still give score to random? we'll give to boys as default
      const targetTeam = winningTeam || 'boys';
      // generate random score from pool
      const pool = [1000,2000,3000,4000,5000,-1000,-2000,-3000,-5000,10000,20000];
      const q = questions[currentIndex];
      if (q.difficulty === 'difficult') pool.push(50000);
      const randomIdx = Math.floor(Math.random() * pool.length);
      const score = pool[randomIdx];
      barScoreValue = score;
      barRevealed = true;
      barBtn.textContent = `${score > 0 ? '+' : ''}${score}`;
      barBtn.classList.add('hidden-bar');

      // add to team
      if (targetTeam === 'boys') {
        boysScore += score;
        statusMsg.textContent = `➕ BOYS ${score > 0 ? '+' : ''}${score}`;
      } else {
        girlsScore += score;
        statusMsg.textContent = `➕ GIRLS ${score > 0 ? '+' : ''}${score}`;
      }
      updateScores();
      // speak correct answer
      const correctAns = q.choices[q.answer];
      speakText(`Score added. Correct answer is ${correctAns}`);
    }

    // next button
    function onNext() {
      if (!barRevealed && roundFinished) {
        // if round finished but bar not pressed, we still allow? we give warning
        speakText('Press the score bar first');
        statusMsg.textContent = '⚠️ Press the score bar first!';
        return;
      }
      clearInterval(timerInterval);
      currentIndex = (currentIndex + 1) % questions.length;
      loadQuestion(currentIndex);
    }

    // attach events to all choice buttons
    allChoiceBtns.forEach(btn => btn.addEventListener('click', onChoiceClick));
    barBtn.addEventListener('click', onBarClick);
    nextBtn.addEventListener('click', onNext);

    // load first
    loadQuestion(0);
    updateScores();
  })();
</script>
</body>
</html>
