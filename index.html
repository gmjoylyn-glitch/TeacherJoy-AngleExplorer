<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angle Arena · Boys vs Girls</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, #0b1a2e 0%, #1b2f47 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-wrapper {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border-radius: 60px 60px 40px 40px;
            padding: 20px 30px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 3px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .game-wrapper::before {
            content: "🎵 ♪ ♫ ♬";
            position: absolute;
            font-size: 80px;
            opacity: 0.03;
            top: 10%;
            right: 5%;
            transform: rotate(15deg);
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 40px;
            color: #ffd966;
            z-index: 0;
            animation: floatMusic 20s infinite linear;
        }
        .game-wrapper::after {
            content: "♩ 🎵 ♪ 🎶";
            position: absolute;
            font-size: 60px;
            opacity: 0.03;
            bottom: 10%;
            left: 5%;
            transform: rotate(-10deg);
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 30px;
            color: #80cbc4;
            z-index: 0;
            animation: floatMusic 25s infinite linear reverse;
        }
        @keyframes floatMusic {
            0% { transform: translateX(0) rotate(15deg); }
            50% { transform: translateX(-50px) rotate(10deg); }
            100% { transform: translateX(0) rotate(15deg); }
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 80px;
            padding: 8px 20px;
            backdrop-filter: blur(6px);
            border: 1px solid #f7d44a;
            box-shadow: 0 0 15px #f7b32b55;
            position: relative;
            z-index: 1;
            flex-wrap: nowrap;
            gap: 8px;
            min-height: 60px;
        }
        .team-score {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .team-badge {
            background: #202f44;
            padding: 4px 14px 4px 12px;
            border-radius: 40px;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            color: #ffd966;
            box-shadow: inset 0 -2px 0 #f0b54a;
            white-space: nowrap;
        }
        .team-badge.boys {
            background: #1b3b6b;
            border-left: 6px solid #3d9eff;
        }
        .team-badge.girls {
            background: #6b2f5c;
            border-left: 6px solid #ff7eb3;
        }
        .score-value {
            font-size: 1.8rem;
            font-family: 'Fredoka One', cursive;
            background: #0a141f;
            padding: 0 16px;
            border-radius: 50px;
            color: #fae67a;
            text-shadow: 0 0 10px #fabc2c;
            min-width: 70px;
            text-align: center;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            line-height: 1.4;
        }
        .score-value.boys-score { color: #7bb3ff; text-shadow: 0 0 12px #3d9eff; }
        .score-value.girls-score { color: #ff8ec4; text-shadow: 0 0 12px #ff4f9e; }
        .score-value.pop {
            animation: scorePop 0.5s ease;
        }
        @keyframes scorePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); color: #ffd700; text-shadow: 0 0 30px #ffd700; }
            100% { transform: scale(1); }
        }

        .timer-section {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 3px 12px 3px 16px;
            border-radius: 50px;
            border: 1px solid #4a6a8a;
            flex-shrink: 0;
        }
        .timer-section span {
            font-size: 1rem;
        }
        .timer-display {
            font-size: 1.2rem;
            color: #76ff03;
            background: #0e1d2b;
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 700;
            min-width: 60px;
            text-align: center;
            font-family: 'Fredoka One', cursive;
            letter-spacing: 1px;
        }
        .start-timer-btn {
            background: #4caf50;
            border: none;
            border-radius: 40px;
            padding: 4px 16px;
            font-weight: 800;
            font-size: 0.85rem;
            color: #0d1f2e;
            box-shadow: 0 3px 0 #2e7d32;
            cursor: pointer;
            transition: 0.06s linear;
            border: 1px solid #81c784;
            white-space: nowrap;
        }
        .start-timer-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 0 #2e7d32;
        }
        .start-timer-btn:disabled {
            opacity: 0.4;
            transform: translateY(3px);
            box-shadow: 0 0 0 #2e7d32;
            pointer-events: none;
        }
        .start-timer-btn.running {
            background: #ff9800;
            box-shadow: 0 3px 0 #e65100;
            border-color: #ffb74d;
        }

        .difficulty-badge {
            display: none !important;
        }

        .question-area {
            background: #1c2a3b;
            border-radius: 28px;
            padding: 20px 24px 16px;
            margin-bottom: 20px;
            box-shadow: inset 0 -4px 0 #0e1a26;
            position: relative;
            z-index: 1;
            width: 100%;
        }
        .q-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #f0f7ff;
            background: #14212f;
            padding: 16px 24px;
            border-radius: 40px;
            text-align: center;
            margin-bottom: 16px;
            border: 1px solid #4b6f8f;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            width: 100%;
        }
        .diagram-container {
            background: #f2f6fc;
            border-radius: 24px;
            padding: 16px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 160px;
            border: 2px solid #b9cfec;
            width: 100%;
        }
        .diagram-container img {
            max-width: 100%;
            max-height: 220px;
            object-fit: contain;
            border-radius: 16px;
            background: white;
            padding: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .diagram-placeholder {
            font-size: 1.2rem;
            color: #2b4a6b;
            font-weight: 600;
            padding: 10px;
        }

        .choices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 20px 0 16px;
            width: 100%;
        }
        .choice-btn {
            background: #2f4057;
            border: none;
            border-radius: 50px;
            padding: 18px 12px;
            font-size: 1.15rem;
            font-weight: 700;
            color: #f0faff;
            text-align: center;
            box-shadow: 0 5px 0 #121e2b;
            transition: all 0.08s linear;
            cursor: pointer;
            letter-spacing: 0.5px;
            border: 1px solid #6f8aa8;
            width: 100%;
        }
        .choice-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #121e2b;
        }
        .choice-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.6);
        }
        .choice-btn.correct-reveal {
            background: #2a9d8f;
            border-color: #b8f2e6;
            box-shadow: 0 0 20px #2a9d8faa;
            animation: pulseGlow 0.5s ease-in-out 2;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px #2a9d8faa; }
            50% { box-shadow: 0 0 40px #2a9d8f, 0 0 60px #2a9d8f66; }
        }
        .choice-btn.wrong-reveal {
            background: #b13e4b;
            border-color: #ffb3b3;
            animation: shake 0.3s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .roll-score-btn {
            background: #f5b042;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #1a1f2b;
            box-shadow: 0 5px 0 #9e6d28;
            flex: 1;
            transition: 0.06s linear;
            cursor: pointer;
            text-shadow: 0 1px 0 #ffe18f;
            border: 1px solid #ffe28b;
            min-width: 120px;
        }
        .roll-score-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #9e6d28;
        }
        .roll-score-btn:disabled {
            opacity: 0.5;
            transform: translateY(3px);
            box-shadow: 0 2px 0 #6e4d1e;
            pointer-events: none;
        }
        .next-btn {
            background: #48a0d6;
            border: none;
            border-radius: 40px;
            padding: 12px 22px;
            font-weight: 800;
            font-size: 1.1rem;
            color: #0d1f2e;
            box-shadow: 0 5px 0 #1f5a7a;
            cursor: pointer;
            transition: 0.06s linear;
            border: 1px solid #8fcbff;
            flex: 1;
            min-width: 100px;
        }
        .next-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #1f5a7a;
        }
        .next-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .roll-display {
            background: #0b1a28;
            border-radius: 40px;
            padding: 6px 20px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffd966;
            min-width: 110px;
            text-align: center;
            border: 1px solid #f7c948;
            font-family: 'Fredoka One', cursive;
            transition: all 0.1s ease;
        }
        .roll-display.spinning {
            animation: spinGlow 0.1s ease infinite alternate;
        }
        @keyframes spinGlow {
            0% { color: #ffd966; border-color: #f7c948; }
            50% { color: #ff6b6b; border-color: #ff6b6b; }
            100% { color: #69db7c; border-color: #69db7c; }
        }

        .team-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 14px 0 8px;
            flex-wrap: wrap;
        }
        .team-select-btn {
            padding: 14px 45px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.3rem;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            position: relative;
            min-width: 140px;
            opacity: 0.4;
            pointer-events: none;
            transform: scale(0.95);
        }
        .team-select-btn.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
        .team-select-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.3);
        }
        .team-select-btn.boys-btn {
            background: #1b3b6b;
            color: #9ac7ff;
            border-color: #3d9eff;
        }
        .team-select-btn.boys-btn:hover:not(:disabled).active {
            background: #2a5298;
            transform: scale(1.03);
        }
        .team-select-btn.boys-btn.selected {
            background: #3d9eff;
            color: #0b1a2e;
            box-shadow: 0 0 30px #3d9effaa, 0 4px 0 #1a3a6a;
            transform: scale(1.05);
            border-color: #7bb3ff;
        }
        .team-select-btn.girls-btn {
            background: #6b2f5c;
            color: #ffb3d1;
            border-color: #ff7eb3;
        }
        .team-select-btn.girls-btn:hover:not(:disabled).active {
            background: #8a3d78;
            transform: scale(1.03);
        }
        .team-select-btn.girls-btn.selected {
            background: #ff7eb3;
            color: #2a1a22;
            box-shadow: 0 0 30px #ff7eb3aa, 0 4px 0 #6a2f5c;
            transform: scale(1.05);
            border-color: #ffb3d1;
        }
        .team-select-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
            transform: scale(0.95);
        }

        .turn-indicator {
            text-align: center;
            margin-top: 8px;
            font-weight: 600;
            color: #bdd4f0;
            background: #142433;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 1.05rem;
            border: 1px solid #3a5a7a;
            transition: all 0.3s ease;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .turn-indicator.big-text {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .turn-indicator.celebrate {
            background: #1a3a2a;
            border-color: #ffd700;
            box-shadow: 0 0 30px #ffd70033;
        }
        .turn-indicator.bad-luck {
            background: #3a1a1a;
            border-color: #ff4444;
            box-shadow: 0 0 30px #ff444433;
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #f7d44a;
            border-radius: 50px;
            padding: 10px 18px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            z-index: 999;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            font-size: 1rem;
        }
        .music-control:hover {
            background: rgba(255,215,0,0.2);
            transform: scale(1.05);
        }

        @media (max-width: 850px) {
            .scoreboard {
                flex-wrap: wrap;
                justify-content: center;
                padding: 10px 15px;
                gap: 6px;
                border-radius: 40px;
            }
            .team-score {
                gap: 6px;
            }
            .team-badge {
                font-size: 0.8rem;
                padding: 3px 10px 3px 8px;
            }
            .score-value {
                font-size: 1.4rem;
                min-width: 55px;
                padding: 0 12px;
            }
            .timer-section {
                padding: 2px 10px 2px 12px;
            }
            .timer-display {
                font-size: 1rem;
                min-width: 50px;
                padding: 2px 10px;
            }
            .start-timer-btn {
                font-size: 0.75rem;
                padding: 3px 12px;
            }
            .timer-section span {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 768px) {
            .game-wrapper {
                max-width: 100%;
                padding: 16px;
            }
            .scoreboard { 
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-around;
                padding: 8px 12px;
                border-radius: 30px;
            }
            .team-score { 
                justify-content: center;
                flex: 1;
                min-width: 80px;
            }
            .team-badge {
                font-size: 0.7rem;
                padding: 2px 8px 2px 6px;
                border-left-width: 4px;
            }
            .score-value {
                font-size: 1.2rem;
                min-width: 45px;
                padding: 0 10px;
            }
            .timer-section { 
                justify-content: center;
                padding: 2px 8px 2px 10px;
                gap: 4px;
            }
            .timer-display {
                font-size: 0.9rem;
                min-width: 40px;
                padding: 2px 8px;
            }
            .start-timer-btn {
                font-size: 0.65rem;
                padding: 2px 10px;
            }
            .choices { grid-template-columns: 1fr; gap: 10px; }
            .choice-btn { padding: 14px 10px; font-size: 1rem; }
            .action-row { flex-direction: column; }
            .roll-score-btn, .next-btn { width: 100%; }
            .team-select-btn { padding: 10px 20px; font-size: 1rem; min-width: 100px; }
            .q-text { font-size: 1.1rem; padding: 12px 16px; min-height: 60px; }
            .turn-indicator.big-text { font-size: 1.2rem; }
            .game-wrapper::before, .game-wrapper::after { display: none; }
            .diagram-container { min-height: 120px; }
            .diagram-container img { max-height: 150px; }
        }

        @media (max-width: 480px) {
            .scoreboard {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 4px;
                padding: 6px 10px;
            }
            .team-score {
                flex: 0 0 auto;
                gap: 4px;
            }
            .team-badge {
                font-size: 0.6rem;
                padding: 2px 6px;
                border-left-width: 3px;
            }
            .score-value {
                font-size: 1rem;
                min-width: 35px;
                padding: 0 6px;
            }
            .timer-section {
                padding: 2px 6px;
                gap: 3px;
            }
            .timer-display {
                font-size: 0.8rem;
                min-width: 35px;
                padding: 1px 6px;
            }
            .start-timer-btn {
                font-size: 0.6rem;
                padding: 2px 8px;
            }
            .timer-section span {
                font-size: 0.75rem;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .choices { gap: 12px; }
            .choice-btn { font-size: 1.05rem; padding: 16px 10px; }
            .scoreboard { padding: 8px 16px; }
            .team-badge { font-size: 0.85rem; }
            .score-value { font-size: 1.6rem; min-width: 60px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="app">
    <div class="scoreboard">
        <div class="team-score">
            <span class="team-badge boys">⚔️ BOYS</span>
            <span class="score-value boys-score" id="boysTotal">0</span>
        </div>
        <div class="timer-section">
            <span>⏱️</span>
            <span class="timer-display" id="timerDisplay">⏳ 20</span>
            <button class="start-timer-btn" id="startTimerBtn">▶ START</button>
        </div>
        <div class="team-score">
            <span class="team-badge girls">🌸 GIRLS</span>
            <span class="score-value girls-score" id="girlsTotal">0</span>
        </div>
    </div>

    <div class="question-area">
        <div class="q-text" id="questionText">
            <span>Question loads here</span>
            <span class="difficulty-badge easy" id="difficultyBadge">EASY</span>
        </div>
        <div class="diagram-container" id="diagramContainer"><div class="diagram-placeholder">📐 Diagram</div></div>
    </div>

    <div class="choices" id="choicesContainer"></div>

    <div class="action-row">
        <button class="roll-score-btn" id="rollBtn">🎲 ROLL SCORE</button>
        <span class="roll-display" id="rollDisplay">0</span>
        <button class="next-btn" id="nextBtn">⏩ NEXT</button>
    </div>

    <div class="team-selector">
        <button class="team-select-btn boys-btn" id="boysSelectBtn">⚔️ BOYS</button>
        <button class="team-select-btn girls-btn" id="girlsSelectBtn">🌸 GIRLS</button>
    </div>

    <div class="turn-indicator" id="statusMsg">✅ Teacher: Click START to begin the round!</div>
</div>

<button class="music-control" id="musicToggle">🎵 Music: ON</button>

<script>
    (function() {
        // ---------- SUPER MARIO STYLE BACKGROUND MUSIC ----------
        let musicCtx = null;
        let musicGain = null;
        let musicInterval = null;
        let musicEnabled = true;
        let musicNoteIndex = 0;
        
        const marioMelody = [
            { note: 659, dur: 150 }, { note: 659, dur: 150 }, { note: 659, dur: 150 },
            { note: 523, dur: 120 }, { note: 659, dur: 120 }, { note: 784, dur: 200 },
            { note: 392, dur: 150 }, { note: 523, dur: 150 }, { note: 659, dur: 150 },
            { note: 784, dur: 200 }, { note: 659, dur: 150 }, { note: 523, dur: 150 },
            { note: 659, dur: 150 }, { note: 784, dur: 200 }, { note: 659, dur: 150 },
            { note: 523, dur: 150 }, { note: 659, dur: 150 }, { note: 784, dur: 200 },
            { note: 659, dur: 150 }, { note: 523, dur: 150 }, { note: 659, dur: 150 },
            { note: 784, dur: 200 }, { note: 988, dur: 200 }, { note: 784, dur: 200 },
            { note: 659, dur: 150 }, { note: 523, dur: 150 },
        ];

        function startBackgroundMusic() {
            try {
                if (musicCtx && musicCtx.state === 'running') return;
                musicCtx = new (window.AudioContext || window.webkitAudioContext)();
                musicGain = musicCtx.createGain();
                musicGain.gain.value = 0.08;
                musicGain.connect(musicCtx.destination);
                playMarioNote();
                musicInterval = setInterval(() => {
                    if (musicEnabled && musicCtx && musicCtx.state === 'running') {
                        playMarioNote();
                    }
                }, 180);
            } catch(e) {}
        }

        function playMarioNote() {
            try {
                if (!musicCtx || musicCtx.state !== 'running') return;
                if (musicNoteIndex >= marioMelody.length) musicNoteIndex = 0;
                const noteData = marioMelody[musicNoteIndex];
                const osc = musicCtx.createOscillator();
                const gain = musicCtx.createGain();
                osc.connect(gain);
                gain.connect(musicGain);
                osc.frequency.value = noteData.note;
                osc.type = 'square';
                gain.gain.setValueAtTime(0.08, musicCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, musicCtx.currentTime + (noteData.dur / 1000));
                osc.start(musicCtx.currentTime);
                osc.stop(musicCtx.currentTime + (noteData.dur / 1000));
                const osc2 = musicCtx.createOscillator();
                const gain2 = musicCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(musicGain);
                osc2.frequency.value = noteData.note / 2;
                osc2.type = 'square';

        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = getAudioContext();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);

                switch(type) {
                    case 'correct':
                        oscillator.frequency.setValueAtTime(880, ctx.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.3);
                        gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 0.35);
                        break;
                    case 'wrong':
                        oscillator.frequency.setValueAtTime(300, ctx.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.3);
                        gainNode.gain.setValueAtTime(0.25, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 0.35);
                        break;
                    case 'tick':
                        oscillator.frequency.setValueAtTime(800, ctx.currentTime);
                        gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 0.08);
                        break;
                    case 'rollstop':
                        oscillator.frequency.setValueAtTime(523, ctx.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(1047, ctx.currentTime + 0.3);
                        gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 0.35);
                        break;
                    case 'victory':
                        [523, 659, 784, 1047].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.12);
                            gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.12);
                            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.12 + 0.2);
                            osc.start(ctx.currentTime + i * 0.12);
                            osc.stop(ctx.currentTime + i * 0.12 + 0.2);
                        });
                        break;
                    case 'starttimer':
                        oscillator.frequency.setValueAtTime(600, ctx.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.2);
                        gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 0.25);
                        break;
                    default:
                        oscillator.frequency.setValueAtTime(440, ctx.currentTime);
                        gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 0.15);
                }
            } catch(e) {}
        }

                nextBtn.disabled = true;
                playSound('victory');
                timerDisplay.textContent = '🎉 FINISH';
                startTimerBtn.textContent = '🏁 END';
                startTimerBtn.disabled = true;
            }
        }
        nextBtn.addEventListener('click', goNext);

        // ---------- RESET (Press R) ----------
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                scores.boys = 0;
                scores.girls = 0;
                boysTotalSpan.textContent = '0';
                girlsTotalSpan.textContent = '0';
                currentIndex = 0;
                hasRolled = false;
                timerStarted = false;
                teamSelectionActive = false;
                renderQuestion(0);
                timerDisplay.textContent = '⏳ Reset';
                startTimerBtn.textContent = '▶ START';
                startTimerBtn.classList.remove('running');
                startTimerBtn.disabled = false;
                playSound('tick');
                boysSelectBtn.disabled = false;
                girlsSelectBtn.disabled = false;
                boysSelectBtn.classList.remove('active');
                girlsSelectBtn.classList.remove('active');
                selectedTeam = 'boys';
                statusMsg.textContent = '🔄 Game reset! Teacher: Click START to begin!';
                statusMsg.className = 'turn-indicator';
            }
        });

        // ---------- INIT ----------
        renderQuestion(0);
        selectedTeam = 'boys';
        console.log('Game initialized - Funny score messages activated!');
    })();
</script>
</body>
</html>
