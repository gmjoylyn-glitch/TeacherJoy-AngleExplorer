<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angle Arena · Boys vs Girls</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, #0b1a2e 0%, #1b2f47 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-wrapper {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border-radius: 60px 60px 40px 40px;
            padding: 20px 25px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 3px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .game-wrapper::before {
            content: "🎵 ♪ ♫ ♬";
            position: absolute;
            font-size: 80px;
            opacity: 0.03;
            top: 10%;
            right: 5%;
            transform: rotate(15deg);
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 40px;
            color: #ffd966;
            z-index: 0;
            animation: floatMusic 20s infinite linear;
        }
        .game-wrapper::after {
            content: "♩ 🎵 ♪ 🎶";
            position: absolute;
            font-size: 60px;
            opacity: 0.03;
            bottom: 10%;
            left: 5%;
            transform: rotate(-10deg);
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 30px;
            color: #80cbc4;
            z-index: 0;
            animation: floatMusic 25s infinite linear reverse;
        }
        @keyframes floatMusic {
            0% { transform: translateX(0) rotate(15deg); }
            50% { transform: translateX(-50px) rotate(10deg); }
            100% { transform: translateX(0) rotate(15deg); }
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 80px;
            padding: 8px 25px 8px 25px;
            backdrop-filter: blur(6px);
            border: 1px solid #f7d44a;
            box-shadow: 0 0 15px #f7b32b55;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            gap: 10px;
        }
        .team-score {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
        }
        .team-badge {
            background: #202f44;
            padding: 6px 18px 6px 14px;
            border-radius: 40px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #ffd966;
            box-shadow: inset 0 -2px 0 #f0b54a;
        }
        .team-badge.boys {
            background: #1b3b6b;
            border-left: 6px solid #3d9eff;
        }
        .team-badge.girls {
            background: #6b2f5c;
            border-left: 6px solid #ff7eb3;
        }
        .score-value {
            font-size: 2.2rem;
            font-family: 'Fredoka One', cursive;
            background: #0a141f;
            padding: 0 20px;
            border-radius: 50px;
            color: #fae67a;
            text-shadow: 0 0 10px #fabc2c;
            min-width: 90px;
            text-align: center;
            letter-spacing: 2px;
        }
        .score-value.boys-score { color: #7bb3ff; text-shadow: 0 0 12px #3d9eff; }
        .score-value.girls-score { color: #ff8ec4; text-shadow: 0 0 12px #ff4f9e; }

        .timer-display {
            font-size: 1.1rem;
            color: #b9d0f0;
            background: #0e1d2b;
            padding: 4px 20px;
            border-radius: 40px;
            font-weight: 700;
            min-width: 80px;
            text-align: center;
        }

        .question-area {
            background: #1c2a3b;
            border-radius: 28px;
            padding: 18px 18px 12px;
            margin-bottom: 20px;
            box-shadow: inset 0 -4px 0 #0e1a26;
            position: relative;
            z-index: 1;
        }
        .q-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f0f7ff;
            background: #14212f;
            padding: 14px 18px;
            border-radius: 40px;
            text-align: center;
            margin-bottom: 12px;
            border: 1px solid #4b6f8f;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .diagram-container {
            background: #f2f6fc;
            border-radius: 24px;
            padding: 12px 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 140px;
            border: 2px solid #b9cfec;
        }
        .diagram-container img {
            max-width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 16px;
            background: white;
            padding: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .diagram-placeholder {
            font-size: 1.2rem;
            color: #2b4a6b;
            font-weight: 600;
            padding: 10px;
        }

        .choices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0 12px;
        }
        .choice-btn {
            background: #2f4057;
            border: none;
            border-radius: 50px;
            padding: 16px 8px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #f0faff;
            text-align: center;
            box-shadow: 0 5px 0 #121e2b;
            transition: all 0.08s linear;
            cursor: pointer;
            letter-spacing: 0.5px;
            border: 1px solid #6f8aa8;
        }
        .choice-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #121e2b;
        }
        .choice-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.6);
        }
        .choice-btn.correct-reveal {
            background: #2a9d8f;
            border-color: #b8f2e6;
            box-shadow: 0 0 20px #2a9d8faa;
            animation: pulseGlow 0.5s ease-in-out 2;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px #2a9d8faa; }
            50% { box-shadow: 0 0 40px #2a9d8f, 0 0 60px #2a9d8f66; }
        }
        .choice-btn.wrong-reveal {
            background: #b13e4b;
            border-color: #ffb3b3;
            animation: shake 0.3s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .roll-score-btn {
            background: #f5b042;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #1a1f2b;
            box-shadow: 0 5px 0 #9e6d28;
            flex: 1;
            transition: 0.06s linear;
            cursor: pointer;
            text-shadow: 0 1px 0 #ffe18f;
            border: 1px solid #ffe28b;
            min-width: 120px;
        }
        .roll-score-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #9e6d28;
        }
        .roll-score-btn:disabled {
            opacity: 0.5;
            transform: translateY(3px);
            box-shadow: 0 2px 0 #6e4d1e;
            pointer-events: none;
        }
        .next-btn {
            background: #48a0d6;
            border: none;
            border-radius: 40px;
            padding: 12px 22px;
            font-weight: 800;
            font-size: 1.1rem;
            color: #0d1f2e;
            box-shadow: 0 5px 0 #1f5a7a;
            cursor: pointer;
            transition: 0.06s linear;
            border: 1px solid #8fcbff;
            flex: 1;
            min-width: 100px;
        }
        .next-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #1f5a7a;
        }
        .next-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .roll-display {
            background: #0b1a28;
            border-radius: 40px;
            padding: 6px 20px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffd966;
            min-width: 110px;
            text-align: center;
            border: 1px solid #f7c948;
            font-family: 'Fredoka One', cursive;
        }

        .team-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 14px 0 8px;
            flex-wrap: wrap;
        }
        .team-select-btn {
            padding: 14px 45px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.3rem;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            position: relative;
            min-width: 140px;
        }
        .team-select-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.3);
        }
        .team-select-btn.boys-btn {
            background: #1b3b6b;
            color: #9ac7ff;
            border-color: #3d9eff;
        }
        .team-select-btn.boys-btn:hover:not(:disabled) {
            background: #2a5298;
            transform: scale(1.03);
        }
        .team-select-btn.boys-btn.selected {
            background: #3d9eff;
            color: #0b1a2e;
            box-shadow: 0 0 30px #3d9effaa, 0 4px 0 #1a3a6a;
            transform: scale(1.05);
            border-color: #7bb3ff;
        }
        .team-select-btn.girls-btn {
            background: #6b2f5c;
            color: #ffb3d1;
            border-color: #ff7eb3;
        }
        .team-select-btn.girls-btn:hover:not(:disabled) {
            background: #8a3d78;
            transform: scale(1.03);
        }
        .team-select-btn.girls-btn.selected {
            background: #ff7eb3;
            color: #2a1a22;
            box-shadow: 0 0 30px #ff7eb3aa, 0 4px 0 #6a2f5c;
            transform: scale(1.05);
            border-color: #ffb3d1;
        }
        .team-select-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
            transform: scale(0.95);
        }

        .turn-indicator {
            text-align: center;
            margin-top: 8px;
            font-weight: 600;
            color: #bdd4f0;
            background: #142433;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 1.05rem;
            border: 1px solid #3a5a7a;
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #f7d44a;
            border-radius: 50px;
            padding: 10px 18px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            z-index: 999;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            font-size: 1rem;
        }
        .music-control:hover {
            background: rgba(255,215,0,0.2);
            transform: scale(1.05);
        }

        @media (max-width: 650px) {
            .scoreboard { flex-direction: column; align-items: stretch; gap: 8px; }
            .team-score { justify-content: center; }
            .choices { grid-template-columns: 1fr; }
            .action-row { flex-direction: column; }
            .roll-score-btn, .next-btn { width: 100%; }
            .team-select-btn { padding: 10px 20px; font-size: 1rem; min-width: 100px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper" id="app">
    <div class="scoreboard">
        <div class="team-score"><span class="team-badge boys">⚔️ BOYS</span><span class="score-value boys-score" id="boysTotal">0</span></div>
        <div class="timer-display" id="timerDisplay">⏳ 20s</div>
        <div class="team-score"><span class="team-badge girls">🌸 GIRLS</span><span class="score-value girls-score" id="girlsTotal">0</span></div>
    </div>

    <div class="question-area">
        <div class="q-text" id="questionText">Question loads here</div>
        <div class="diagram-container" id="diagramContainer"><div class="diagram-placeholder">📐 Diagram</div></div>
    </div>

    <div class="choices" id="choicesContainer"></div>

    <div class="action-row">
        <button class="roll-score-btn" id="rollBtn">🎲 ROLL SCORE</button>
        <span class="roll-display" id="rollDisplay">0</span>
        <button class="next-btn" id="nextBtn">⏩ NEXT</button>
    </div>

    <div class="team-selector">
        <button class="team-select-btn boys-btn selected" id="boysSelectBtn">⚔️ BOYS</button>
        <button class="team-select-btn girls-btn" id="girlsSelectBtn">🌸 GIRLS</button>
    </div>

    <div class="turn-indicator" id="statusMsg">✅ Select a team, then tap an answer!</div>
</div>

<button class="music-control" id="musicToggle">🎵 Music: ON</button>

<script>
    (function() {
        // ---------- SUPER MARIO STYLE BACKGROUND MUSIC ----------
        let musicCtx = null;
        let musicGain = null;
        let musicInterval = null;
        let musicEnabled = true;
        let musicNoteIndex = 0;
        
        // Super Mario Bros theme melody (simplified)
        const marioMelody = [
            { note: 659, dur: 150 },  // E
            { note: 659, dur: 150 },  // E
            { note: 659, dur: 150 },  // E
            { note: 523, dur: 120 },  // C
            { note: 659, dur: 120 },  // E
            { note: 784, dur: 200 },  // G
            { note: 392, dur: 150 },  // G
            { note: 523, dur: 150 },  // C
            { note: 659, dur: 150 },  // E
            { note: 784, dur: 200 },  // G
            { note: 659, dur: 150 },  // E
            { note: 523, dur: 150 },  // C
            { note: 659, dur: 150 },  // E
            { note: 784, dur: 200 },  // G
            { note: 659, dur: 150 },  // E
            { note: 523, dur: 150 },  // C
            { note: 659, dur: 150 },  // E
            { note: 784, dur: 200 },  // G
            { note: 659, dur: 150 },  // E
            { note: 523, dur: 150 },  // C
            { note: 659, dur: 150 },  // E
            { note: 784, dur: 200 },  // G
            { note: 988, dur: 200 },  // B
            { note: 784, dur: 200 },  // G
            { note: 659, dur: 150 },  // E
            { note: 523, dur: 150 },  // C
        ];

        function startBackgroundMusic() {
            try {
                if (musicCtx && musicCtx.state === 'running') return;
                musicCtx = new (window.AudioContext || window.webkitAudioContext)();
                musicGain = musicCtx.createGain();
                musicGain.gain.value = 0.08;
                musicGain.connect(musicCtx.destination);
                
                playMarioNote();
                musicInterval = setInterval(() => {
                    if (musicEnabled && musicCtx && musicCtx.state === 'running') {
                        playMarioNote();
                    }
                }, 180);
            } catch(e) {
                console.log('Music error:', e);
            }
        }

        function playMarioNote() {
            try {
                if (!musicCtx || musicCtx.state !== 'running') return;
                if (musicNoteIndex >= marioMelody.length) {
                    musicNoteIndex = 0;
                }
                
                const noteData = marioMelody[musicNoteIndex];
                const osc = musicCtx.createOscillator();
                const gain = musicCtx.createGain();
                osc.connect(gain);
                gain.connect(musicGain);
                
                osc.frequency.value = noteData.note;
                osc.type = 'square';
                gain.gain.setValueAtTime(0.08, musicCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, musicCtx.currentTime + (noteData.dur / 1000));
                osc.start(musicCtx.currentTime);
                osc.stop(musicCtx.currentTime + (noteData.dur / 1000));
                
                // Add a harmony note (lower octave)
                const osc2 = musicCtx.createOscillator();
                const gain2 = musicCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(musicGain);
                osc2.frequency.value = noteData.note / 2;
                osc2.type = 'square';
                gain2.gain.setValueAtTime(0.04, musicCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, musicCtx.currentTime + (noteData.dur / 1000));
                osc2.start(musicCtx.currentTime);
                osc2.stop(musicCtx.currentTime + (noteData.dur / 1000));
                
                musicNoteIndex++;
            } catch(e) {}
        }

        function stopBackgroundMusic() {
            if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
            if (musicCtx) { try { musicCtx.close(); } catch(e) {} musicCtx = null; }
            musicNoteIndex = 0;
        }

        function toggleMusic() {
            musicEnabled = !musicEnabled;
            const btn = document.getElementById('musicToggle');
            if (musicEnabled) {
                btn.textContent = '🎵 Music: ON';
                if (!musicCtx || musicCtx.state !== 'running') {
                    musicNoteIndex = 0;
                    startBackgroundMusic();
                }
            } else {
                btn.textContent = '🔇 Music: OFF';
                stopBackgroundMusic();
            }
        }
        document.getElementById('musicToggle').addEventListener('click', toggleMusic);
        document.addEventListener('click', function initMusic() {
            if (!musicCtx || musicCtx.state !== 'running') {
                musicNoteIndex = 0;
                startBackgroundMusic();
            }
            document.removeEventListener('click', initMusic);
        }, { once: true });

        // ---------- QUESTIONS DATA ----------
        const questions = [
            { q: "1) Name the part of protractor indicated by the arrow.", img: "Q1.jpg", choices: ["a) center mark", "b) degree mark", "c) zero edges"], correct: 0, time: 15 },
            { q: "2) Name the part of protractor indicated by the arrow.", img: "Q2.jpg", choices: ["a) center mark", "b) degree mark", "c) zero edges"], correct: 1, time: 15 },
            { q: "3) Name the part of protractor indicated by the arrow.", img: "Q3.jpg", choices: ["a) center mark", "b) degree mark", "c) zero edges"], correct: 2, time: 15 },
            { q: "4) Name the angle.", img: "Q4.jpg", choices: ["a) ∠PQR", "b) ∠RPQ", "c) ∠QRP"], correct: 0, time: 15 },
            { q: "5) Name the vertex.", img: "Q5.jpg", choices: ["a) Dot N", "b) Angle N", "c) Point N or .N"], correct: 2, time: 15 },
            { q: "6) Name the arms.", img: "Q6.jpg", choices: ["a) segment CH and CK", "b) line HC and KC", "c) ray CH and CK"], correct: 2, time: 15 },
            { q: "7) ……. is an angle measures bigger than 0° but smaller than 90°", img: null, choices: ["a) Acute", "b) Right", "c) Obtuse"], correct: 0, time: 15 },
            { q: "8) What type of angle is shown in the diagram?", img: "Q8.jpg", choices: ["a) Acute", "b) Right", "c) Obtuse"], correct: 1, time: 15 },
            { q: "9) What type of angle is ∠SUN = 150° ?", img: "Q9.jpg", choices: ["a) Acute", "b) Right", "c) Obtuse"], correct: 2, time: 20 },
            { q: "10) ……. is an angle measures exactly 180°.", img: null, choices: ["a) Right", "b) Obtuse", "c) Straight"], correct: 2, time: 20 },
            { q: "11) Look at the figure. How many acute angles?", img: "Q11.jpg", choices: ["a) 1", "b) 2", "c) 3"], correct: 1, time: 20 },
            { q: "12) Look at the figure. How many right angles?", img: "Q12.jpg", choices: ["a) 3", "b) 12", "c) 14"], correct: 1, time: 20 },
            { q: "13) Measure and read the angle shown.", img: "Q13.jpg", choices: ["a) 50°", "b) 105°", "c) 165°"], correct: 1, time: 30 },
            { q: "14) Find angle b̂.", img: "Q14.jpg", choices: ["a) 30°", "b) 42°", "c) 52°"], correct: 1, time: 30 },
            { q: "15) Find angle â.", img: "Q15.jpg", choices: ["a) 144°", "b) 180°", "c) 324°"], correct: 0, time: 30 }
        ];

        // ---------- GAME STATE ----------
        let currentIndex = 0;
        let timerInterval = null;
        let timeLeft = 20;
        let questionLocked = false;
        let selectedTeam = 'boys';
        let rollActive = false;
        let rollInterval = null;
        let rollValue = 0;
        let hasRolled = false; // Track if roll has been used
        const scores = { boys: 0, girls: 0 };

        // DOM refs
        const questionText = document.getElementById('questionText');
        const diagramContainer = document.getElementById('diagramContainer');
        const choicesContainer = document.getElementById('choicesContainer');
        const rollBtn = document.getElementById('rollBtn');
        const rollDisplay = document.getElementById('rollDisplay');
        const nextBtn = document.getElementById('nextBtn');
        const statusMsg = document.getElementById('statusMsg');
        const boysTotalSpan = document.getElementById('boysTotal');
        const girlsTotalSpan = document.getElementById('girlsTotal');
        const timerDisplay = document.getElementById('timerDisplay');
        const boysSelectBtn = document.getElementById('boysSelectBtn');
        const girlsSelectBtn = document.getElementById('girlsSelectBtn');

        // ---------- SOUND EFFECTS ----------
        let audioCtx = null;

        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playSound(type) {
            try {
                const ctx = getAudioContext();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);

                switch(type) {
                    case 'correct':
                        oscillator.frequency.setValueAtTime(880, ctx.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.3);
                        gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 0.35);
                        break;
                    case 'wrong':
                        oscillator.frequency.setValueAtTime(300, ctx.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.3);
                        gainNode.gain.setValueAtTime(0.25, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 0.35);
                        break;
                    case 'tick':
                        oscillator.frequency.setValueAtTime(800, ctx.currentTime);
                        gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 0.08);
                        break;
                    case 'rollstop':
                        oscillator.frequency.setValueAtTime(523, ctx.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(1047, ctx.currentTime + 0.3);
                        gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 0.35);
                        break;
                    case 'victory':
                        [523, 659, 784, 1047].forEach((freq, i) => {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.12);
                            gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.12);
                            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.12 + 0.2);
                            osc.start(ctx.currentTime + i * 0.12);
                            osc.stop(ctx.currentTime + i * 0.12 + 0.2);
                        });
                        break;
                    default:
                        oscillator.frequency.setValueAtTime(440, ctx.currentTime);
                        gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                        oscillator.start(ctx.currentTime);
                        oscillator.stop(ctx.currentTime + 0.15);
                }
            } catch(e) {}
        }

        // ---------- TIMER ----------
        function startTimer(seconds) {
            if (timerInterval) clearInterval(timerInterval);
            timeLeft = seconds;
            timerDisplay.textContent = `⏳ ${timeLeft}s`;
            timerInterval = setInterval(() => {
                timeLeft -= 1;
                timerDisplay.textContent = `⏳ ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.textContent = '⏰ 0s';
                    if (!questionLocked) {
                        questionLocked = true;
                        revealCorrectAnswer();
                        playSound('wrong');
                    }
                }
            }, 1000);
        }

        function revealCorrectAnswer() {
            const q = questions[currentIndex];
            const correctIdx = q.correct;
            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.classList.add('disabled');
                const idx = parseInt(btn.dataset.idx);
                if (idx === correctIdx) {
                    btn.classList.add('correct-reveal');
                }
            });
            statusMsg.textContent = '⏰ Time up! Correct answer shown.';
            rollBtn.disabled = true;
            nextBtn.disabled = false;
        }

        // ---------- RENDER QUESTION ----------
        function renderQuestion(index) {
            const q = questions[index];
            if (!q) return;
            
            questionLocked = false;
            rollActive = false;
            hasRolled = false;
            if (rollInterval) clearInterval(rollInterval);
            
            questionText.textContent = q.q;

            const imgHtml = q.img ? `<img src="${q.img}" alt="diagram" style="max-width:100%;max-height:200px;">` : `<div class="diagram-placeholder">📐 No diagram</div>`;
            diagramContainer.innerHTML = imgHtml;

            renderChoices(q.choices, q.correct);

            rollBtn.disabled = true;
            rollBtn.textContent = '🎲 ROLL SCORE';
            rollDisplay.textContent = '0';
            nextBtn.disabled = true;
            statusMsg.innerHTML = `✅ Select a team below, then tap an answer! Currently: <strong>${selectedTeam.toUpperCase()}</strong>`;
            
            boysSelectBtn.disabled = false;
            girlsSelectBtn.disabled = false;
            updateTeamSelection();

            startTimer(q.time);
        }

        function renderChoices(choiceTexts, correctIdx) {
            choicesContainer.innerHTML = '';
            choiceTexts.forEach((text, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = text;
                btn.dataset.idx = idx;
                btn.dataset.correct = correctIdx;
                btn.addEventListener('click', (e) => handleChoice(idx, correctIdx, btn));
                choicesContainer.appendChild(btn);
            });
        }

        // ---------- HANDLE CHOICE ----------
        function handleChoice(idx, correctIdx, btnEl) {
            if (questionLocked) return;
            
            const isCorrect = (idx === correctIdx);
            
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.add('disabled'));

            if (isCorrect) {
                btnEl.classList.add('correct-reveal');
                playSound('correct');
                questionLocked = true;
                
                statusMsg.innerHTML = `✅ Correct! <strong>${selectedTeam.toUpperCase()}</strong> can now roll for points!`;
                rollBtn.disabled = false;
                hasRolled = false;
                playSound('victory');
            } else {
                btnEl.classList.add('wrong-reveal');
                playSound('wrong');
                statusMsg.textContent = '❌ Wrong! Correct answer revealed.';
                questionLocked = true;
                revealCorrectAnswer();
            }
        }

        // ---------- TEAM SELECTION - FIXED ----------
        function updateTeamSelection() {
            boysSelectBtn.classList.toggle('selected', selectedTeam === 'boys');
            girlsSelectBtn.classList.toggle('selected', selectedTeam === 'girls');
        }

        boysSelectBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (questionLocked && !hasRolled) {
                statusMsg.textContent = '⛔ Question already answered! Roll for points or click NEXT.';
                return;
            }
            if (questionLocked && hasRolled) {
                statusMsg.textContent = '⛔ Already rolled! Click NEXT to continue.';
                return;
            }
            selectedTeam = 'boys';
            updateTeamSelection();
            statusMsg.innerHTML = `⚔️ BOYS selected! Tap an answer to earn points for BOYS.`;
            playSound('tick');
        });

        girlsSelectBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (questionLocked && !hasRolled) {
                statusMsg.textContent = '⛔ Question already answered! Roll for points or click NEXT.';
                return;
            }
            if (questionLocked && hasRolled) {
                statusMsg.textContent = '⛔ Already rolled! Click NEXT to continue.';
                return;
            }
            selectedTeam = 'girls';
            updateTeamSelection();
            statusMsg.innerHTML = `🌸 GIRLS selected! Tap an answer to earn points for GIRLS.`;
            playSound('tick');
        });

        // ---------- ROLL SCORE - FIXED FOR BOTH TEAMS ----------
        rollBtn.addEventListener('click', function() {
            // If roll is active, stop it
            if (rollActive) {
                // Stop rolling
                if (rollInterval) {
                    clearInterval(rollInterval);
                    rollInterval = null;
                }
                rollActive = false;
                const finalVal = parseInt(rollDisplay.textContent) || 0;
                
                // Add to selected team's score
                if (selectedTeam === 'boys') {
                    scores.boys += finalVal;
                    boysTotalSpan.textContent = scores.boys;
                } else {
                    scores.girls += finalVal;
                    girlsTotalSpan.textContent = scores.girls;
                }
                
                playSound('rollstop');
                const teamName = selectedTeam.toUpperCase();
                statusMsg.innerHTML = `🎯 <strong>${teamName}</strong> got ${finalVal >= 0 ? '+' : ''}${finalVal} points!`;
                rollBtn.textContent = '🎲 ROLL SCORE';
                rollBtn.disabled = true;
                nextBtn.disabled = false;
                hasRolled = true;
                
                if (timerInterval) clearInterval(timerInterval);
                timerDisplay.textContent = '✅ Done';
                
                boysSelectBtn.disabled = true;
                girlsSelectBtn.disabled = true;
                return;
            }
            
            // Start rolling - check if button is enabled
            if (rollBtn.disabled) {
                statusMsg.textContent = '⛔ You need to answer correctly first!';
                return;
            }
            
            if (!questionLocked) {
                statusMsg.textContent = '⛔ Answer the question first!';
                return;
            }
            
            if (hasRolled) {
                statusMsg.textContent = '⛔ Already rolled! Click NEXT to continue.';
                return;
            }
            
            // Start the roll
            rollActive = true;
            const pool = [1000, 2000, 3000, 4000, 5000, -1000, -2000, -3000, -5000, 10000, 20000, 50000];
            if (questions[currentIndex].time >= 30) {
                pool.push(50000);
            }
            
            // Clear any existing interval
            if (rollInterval) {
                clearInterval(rollInterval);
                rollInterval = null;
            }
            
            rollInterval = setInterval(() => {
                const val = pool[Math.floor(Math.random() * pool.length)];
                rollDisplay.textContent = val;
                rollValue = val;
                playSound('tick');
            }, 80);
            
            rollBtn.textContent = '⏹️ STOP';
            statusMsg.textContent = `🎰 Rolling for ${selectedTeam.toUpperCase()}... press STOP to lock in your score!`;
        });

        // ---------- NEXT ----------
        function goNext() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion(currentIndex);
                boysSelectBtn.disabled = false;
                girlsSelectBtn.disabled = false;
                hasRolled = false;
                updateTeamSelection();
                playSound('tick');
            } else {
                statusMsg.textContent = '🏆 GAME OVER! Great job everyone! 🎉';
                nextBtn.disabled = true;
                playSound('victory');
                timerDisplay.textContent = '🎉 FINISH';
            }
        }
        nextBtn.addEventListener('click', goNext);

        // ---------- RESET (Press R) ----------
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                scores.boys = 0;
                scores.girls = 0;
                boysTotalSpan.textContent = '0';
                girlsTotalSpan.textContent = '0';
                currentIndex = 0;
                hasRolled = false;
                renderQuestion(0);
                timerDisplay.textContent = '⏳ Reset';
                playSound('tick');
                boysSelectBtn.disabled = false;
                girlsSelectBtn.disabled = false;
                selectedTeam = 'boys';
                updateTeamSelection();
                statusMsg.textContent = '🔄 Game reset! Select a team and answer!';
            }
        });

        // ---------- INIT ----------
        renderQuestion(0);
        selectedTeam = 'boys';
        updateTeamSelection();
        console.log('Game initialized - Boys selected by default');
    })();
</script>
</body>
