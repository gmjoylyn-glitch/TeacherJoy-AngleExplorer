<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angle Arena · Boys vs Girls</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(145deg, #0b1a2e 0%, #1b2f47 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-wrapper {
      max-width: 1300px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      border-radius: 60px 60px 40px 40px;
      padding: 20px 25px 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 3px rgba(255,255,255,0.1);
      border: 1px solid rgba(255,215,0,0.2);
    }
    .scoreboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 80px;
      padding: 8px 25px 8px 25px;
      backdrop-filter: blur(6px);
      border: 1px solid #f7d44a;
      box-shadow: 0 0 15px #f7b32b55;
    }
    .team-score {
      display: flex;
      align-items: center;
      gap: 20px;
      font-weight: 700;
    }
    .team-badge {
      background: #202f44;
      padding: 6px 24px 6px 18px;
      border-radius: 40px;
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: #ffd966;
      box-shadow: inset 0 -2px 0 #f0b54a;
    }
    .team-badge.boys {
      background: #1b3b6b;
      border-left: 6px solid #3d9eff;
    }
    .team-badge.girls {
      background: #6b2f5c;
      border-left: 6px solid #ff7eb3;
    }
    .score-value {
      font-size: 2.3rem;
      font-family: 'Fredoka One', cursive;
      background: #0a141f;
      padding: 0 25px;
      border-radius: 50px;
      color: #fae67a;
      text-shadow: 0 0 10px #fabc2c;
      min-width: 110px;
      text-align: center;
      letter-spacing: 2px;
    }
    .score-value.boys-score { color: #7bb3ff; text-shadow: 0 0 12px #3d9eff; }
    .score-value.girls-score { color: #ff8ec4; text-shadow: 0 0 12px #ff4f9e; }

    .question-progress {
      font-size: 1rem;
      color: #b9d0f0;
      background: #0e1d2b;
      padding: 4px 20px;
      border-radius: 40px;
      font-weight: 600;
    }

    .game-grid {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .team-zone {
      flex: 1 1 280px;
      background: rgba(0,0,0,0.3);
      border-radius: 40px;
      padding: 18px 12px 20px;
      backdrop-filter: blur(2px);
      border: 1px solid #566b84;
      transition: all 0.3s;
      box-shadow: 0 8px 0 #111d2b;
      position: relative;
    }
    .team-zone.boys-zone { border-top: 6px solid #3d9eff; }
    .team-zone.girls-zone { border-top: 6px solid #ff7eb3; }
    
    .team-zone.team-winner {
      border-color: #ffd700;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
    }
    
    .team-zone.team-locked {
      opacity: 0.7;
      filter: grayscale(0.3);
    }
    
    .zone-title {
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      color: #e0eefe;
      letter-spacing: 2px;
      padding-bottom: 6px;
      border-bottom: 2px dashed #456a8f;
      margin-bottom: 15px;
    }
    .zone-title.boys-title { color: #9ac7ff; }
    .zone-title.girls-title { color: #ffb3d1; }

    .question-area {
      background: #1c2a3b;
      border-radius: 28px;
      padding: 18px 12px 12px;
      margin-bottom: 20px;
      box-shadow: inset 0 -4px 0 #0e1a26;
    }
    .q-text {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f0f7ff;
      background: #14212f;
      padding: 12px 14px;
      border-radius: 40px;
      text-align: center;
      margin-bottom: 12px;
      border: 1px solid #4b6f8f;
    }
    .diagram-container {
      background: #f2f6fc;
      border-radius: 24px;
      padding: 12px 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 180px;
      border: 2px solid #b9cfec;
    }
    .diagram-container svg {
      max-width: 100%;
      max-height: 170px;
      border-radius: 8px;
      background: white;
    }
    .diagram-placeholder {
      font-size: 1.2rem;
      color: #2b4a6b;
      font-weight: 600;
      padding: 10px;
      text-align: center;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 16px 0 12px;
    }
    .choice-btn {
      background: #2f4057;
      border: none;
      border-radius: 50px;
      padding: 14px 8px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #f0faff;
      text-align: center;
      box-shadow: 0 5px 0 #121e2b;
      transition: all 0.08s linear;
      cursor: pointer;
      letter-spacing: 0.5px;
      border: 1px solid #6f8aa8;
      position: relative;
    }
    .choice-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #121e2b;
    }
    .choice-btn.disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.6);
    }
    .choice-btn.correct-reveal {
      background: #2a9d8f;
      border-color: #b8f2e6;
      box-shadow: 0 0 20px #2a9d8faa;
      animation: pulse-green 0.5s ease-in-out;
    }
    .choice-btn.wrong-reveal {
      background: #b13e4b;
      border-color: #ffb3b3;
      animation: pulse-red 0.5s ease-in-out;
    }
    
    @keyframes pulse-green {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); background: #35b5a5; }
    }
    @keyframes pulse-red {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); background: #d14552; }
    }

    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .roll-score-btn {
      background: #f5b042;
      border: none;
      border-radius: 40px;
      padding: 12px 18px;
      font-weight: 800;
      font-size: 1.2rem;
      color: #1a1f2b;
      box-shadow: 0 5px 0 #9e6d28;
      flex: 1;
      transition: 0.06s linear;
      cursor: pointer;
      text-shadow: 0 1px 0 #ffe18f;
      border: 1px solid #ffe28b;
    }
    .roll-score-btn:active {
      transform: translateY(5px);
      box-shadow: 0 0 0 #9e6d28;
    }
    .roll-score-btn:disabled {
      opacity: 0.5;
      transform: translateY(3px);
      box-shadow: 0 2px 0 #6e4d1e;
      pointer-events: none;
    }
    .next-btn {
      background: #48a0d6;
      border: none;
      border-radius: 40px;
      padding: 12px 22px;
      font-weight: 800;
      font-size: 1.1rem;
      color: #0d1f2e;
      box-shadow: 0 5px 0 #1f5a7a;
      cursor: pointer;
      transition: 0.06s linear;
      border: 1px solid #8fcbff;
      flex: 1;
    }
    .next-btn:active {
      transform: translateY(5px);
      box-shadow: 0 0 0 #1f5a7a;
    }
    .next-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .roll-display {
      background: #0b1a28;
      border-radius: 40px;
      padding: 6px 20px;
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffd966;
      min-width: 110px;
      text-align: center;
      border: 1px solid #f7c948;
      font-family: 'Fredoka One', cursive;
    }

    .turn-indicator {
      text-align: center;
      margin-top: 8px;
      font-weight: 600;
      color: #bdd4f0;
      background: #142433;
      border-radius: 40px;
      padding: 8px;
      font-size: 1rem;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .turn-indicator.team-correct {
      background: #1a5a4a;
      color: #8fffd6;
      border: 1px solid #2a9d8f;
    }
    .turn-indicator.team-wrong {
      background: #5a2a2a;
      color: #ffb3b3;
      border: 1px solid #b13e4b;
    }
    .turn-indicator.team-waiting {
      background: #1a2a4a;
      color: #8fcbff;
      border: 1px solid #3d9eff;
      animation: pulse-blue 1s ease-in-out infinite;
    }
    
    @keyframes pulse-blue {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; background: #1a3a6a; }
    }

    .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .timer-display {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ff6b6b;
      background: #1a0a0a;
      padding: 0 20px;
      border-radius: 40px;
      border: 2px solid #ff4444;
      min-width: 60px;
      text-align: center;
      font-family: 'Fredoka One', cursive;
    }
    .timer-display.urgent {
      animation: blink-red 0.5s ease-in-out infinite;
    }
    @keyframes blink-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Protractor specific styles */
    .protractor-label {
      font-size: 12px;
      font-weight: bold;
      fill: #333;
    }
    .protractor-arrow {
      fill: #e74c3c;
      font-weight: bold;
      font-size: 16px;
    }
    .protractor-degree {
      fill: #2c3e50;
      font-size: 10px;
    }
    .angle-label {
      fill: #2980b9;
      font-weight: bold;
      font-size: 14px;
    }

    @media (max-width: 850px) {
      .scoreboard { flex-direction: column; align-items: stretch; gap: 10px; }
      .team-score { justify-content: center; }
    }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="game-wrapper" id="app">
  <div class="scoreboard">
    <div class="team-score">
      <span class="team-badge boys">⚔️ BOYS</span>
      <span class="score-value boys-score" id="boysTotal">0</span>
    </div>
    <div style="display:flex; gap:15px; align-items:center;">
      <span class="question-progress" id="questionProgress">Q1/15</span>
      <span class="timer-display" id="timerDisplay">15s</span>
    </div>
    <div class="team-score">
      <span class="team-badge girls">🌸 GIRLS</span>
      <span class="score-value girls-score" id="girlsTotal">0</span>
    </div>
  </div>

  <div class="game-grid">
    <div class="team-zone boys-zone" id="boysZone">
      <div class="zone-title boys-title">⚡ BOYS</div>
      <div class="question-area" id="boysQuestionArea">
        <div class="q-text" id="boysQtext">Question loads here</div>
        <div class="diagram-container" id="boysDiagram"><div class="diagram-placeholder">📐 Diagram</div></div>
      </div>
      <div class="choices" id="boysChoices"></div>
      <div class="action-row">
        <button class="roll-score-btn" id="boysRollBtn">🎲 ROLL SCORE</button>
        <span class="roll-display" id="boysRollDisplay">0</span>
        <button class="next-btn" id="boysNextBtn">⏩ NEXT</button>
      </div>
      <div class="turn-indicator" id="boysStatus">✅ ready</div>
    </div>

    <div class="team-zone girls-zone" id="girlsZone">
      <div class="zone-title girls-title">🌸 GIRLS</div>
      <div class="question-area" id="girlsQuestionArea">
        <div class="q-text" id="girlsQtext">Question loads here</div>
        <div class="diagram-container" id="girlsDiagram"><div class="diagram-placeholder">📐 Diagram</div></div>
      </div>
      <div class="choices" id="girlsChoices"></div>
      <div class="action-row">
        <button class="roll-score-btn" id="girlsRollBtn">🎲 ROLL SCORE</button>
        <span class="roll-display" id="girlsRollDisplay">0</span>
        <button class="next-btn" id="girlsNextBtn">⏩ NEXT</button>
      </div>
      <div class="turn-indicator" id="girlsStatus">✅ ready</div>
    </div>
  </div>
</div>

<script>
  (function() {
    // SVG Diagram generators for each question
    const diagramGenerators = {
      // Q1-Q3: Protractor parts
      Q1: function() {
        return `<svg viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="10" width="280" height="130" rx="10" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
          <!-- Protractor semi-circle -->
          <path d="M 30 110 A 80 80 0 0 1 210 110" stroke="#2c3e50" stroke-width="2" fill="none"/>
          <path d="M 30 110 L 210 110" stroke="#2c3e50" stroke-width="2"/>
          <!-- Degree marks -->
          <line x1="55" y1="110" x2="55" y2="95" stroke="#2c3e50" stroke-width="1"/>
          <line x1="85" y1="110" x2="85" y2="90" stroke="#2c3e50" stroke-width="1.5"/>
          <line x1="120" y1="110" x2="120" y2="85" stroke="#2c3e50" stroke-width="2"/>
          <line x1="155" y1="110" x2="155" y2="90" stroke="#2c3e50" stroke-width="1.5"/>
          <line x1="185" y1="110" x2="185" y2="95" stroke="#2c3e50" stroke-width="1"/>
          <!-- Center mark (arrow pointing to center) -->
          <circle cx="120" cy="110" r="4" fill="#e74c3c"/>
          <text x="120" y="130" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">▲ Center Mark</text>
          <text x="120" y="145" font-size="9" fill="#666" text-anchor="middle">(indicated by arrow)</text>
          <!-- Arrow pointing to center -->
          <polygon points="140,95 145,110 135,110" fill="#e74c3c"/>
        </svg>`;
      },
      Q2: function() {
        return `<svg viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="10" width="280" height="130" rx="10" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
          <path d="M 30 110 A 80 80 0 0 1 210 110" stroke="#2c3e50" stroke-width="2" fill="none"/>
          <path d="M 30 110 L 210 110" stroke="#2c3e50" stroke-width="2"/>
          <!-- Degree marks with one highlighted -->
          <line x1="55" y1="110" x2="55" y2="95" stroke="#2c3e50" stroke-width="1"/>
          <line x1="85" y1="110" x2="85" y2="90" stroke="#2c3e50" stroke-width="1.5"/>
          <line x1="120" y1="110" x2="120" y2="85" stroke="#2c3e50" stroke-width="2"/>
          <line x1="155" y1="110" x2="155" y2="90" stroke="#2c3e50" stroke-width="1.5"/>
          <line x1="185" y1="110" x2="185" y2="95" stroke="#2c3e50" stroke-width="1"/>
          <!-- Arrow pointing to a degree mark (at 155) -->
          <polygon points="175,80 170,95 180,95" fill="#e74c3c"/>
          <text x="155" y="75" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">▲ Degree Mark</text>
          <text x="155" y="68" font-size="9" fill="#666" text-anchor="middle">(indicated by arrow)</text>
          <text x="155" y="100" font-size="10" fill="#333" text-anchor="middle">155°</text>
        </svg>`;
      },
      Q3: function() {
        return `<svg viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="10" width="280" height="130" rx="10" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
          <path d="M 30 110 A 80 80 0 0 1 210 110" stroke="#2c3e50" stroke-width="2" fill="none"/>
          <path d="M 30 110 L 210 110" stroke="#2c3e50" stroke-width="2"/>
          <!-- Zero edges highlighted -->
          <path d="M 30 110 L 30 85" stroke="#e74c3c" stroke-width="3"/>
          <path d="M 210 110 L 210 85" stroke="#e74c3c" stroke-width="3"/>
          <text x="30" y="80" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">▲ Zero Edge</text>
          <text x="210" y="80" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">▲ Zero Edge</text>
          <text x="120" y="140" font-size="10" fill="#666" text-anchor="middle">Zero edges (indicated by arrows)</text>
        </svg>`;
      },
      // Q4: Angle PQR
      Q4: function() {
        return `<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="10" width="280" height="160" rx="10" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
          <!-- Angle with points P, Q, R -->
          <line x1="60" y1="140" x2="140" y2="40" stroke="#2c3e50" stroke-width="2"/>
          <line x1="60" y1="140" x2="220" y2="140" stroke="#2c3e50" stroke-width="2"/>
          <!-- Arc for angle -->
          <path d="M 100 120 A 50 50 0 0 1 140 90" stroke="#e74c3c" stroke-width="2" fill="none"/>
          <text x="120" y="100" font-size="14" fill="#e74c3c" font-weight="bold">θ</text>
          <!-- Labels -->
          <text x="130" y="30" font-size="16" fill="#2980b9" font-weight="bold">P</text>
          <text x="50" y="155" font-size="16" fill="#2980b9" font-weight="bold">Q</text>
          <text x="225" y="155" font-size="16" fill="#2980b9" font-weight="bold">R</text>
          <text x="140" y="165" font-size="11" fill="#666">∠PQR (vertex at Q)</text>
        </svg>`;
      },
      // Q5: Vertex (Point N)
      Q5: function() {
        return `<svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="10" width="280" height="140" rx="10" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
          <!-- Intersecting lines -->
          <line x1="50" y1="130" x2="240" y2="30" stroke="#2c3e50" stroke-width="2"/>
          <line x1="50" y1="30" x2="240" y2="130" stroke="#2c3e50" stroke-width="2"/>
          <!-- Vertex point N -->
          <circle cx="140" cy="80" r="5" fill="#e74c3c"/>
          <text x="140" y="100" font-size="16" fill="#e74c3c" text-anchor="middle" font-weight="bold">N</text>
          <text x="140" y="115" font-size="11" fill="#666" text-anchor="middle">(Vertex)</text>
          <!-- Arrow pointing to vertex -->
          <polygon points="160,75 165,90 155,90" fill="#e74c3c"/>
        </svg>`;
      },
      // Q6: Arms (rays)
      Q6: function() {
        return `<svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="10" width="280" height="140" rx="10" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
          <!-- Angle arms as rays -->
          <line x1="80" y1="120" x2="160" y2="40" stroke="#2c3e50" stroke-width="2"/>
          <line x1="80" y1="120" x2="230" y2="120" stroke="#2c3e50" stroke-width="2"/>
          <!-- Labels -->
          <text x="155" y="35" font-size="15" fill="#2980b9" font-weight="bold">C</text>
          <text x="70" y="135" font-size="15" fill="#2980b9" font-weight="bold">H</text>
          <text x="235" y="135" font-size="15" fill="#2980b9" font-weight="bold">K</text>
          <!-- Ray indicators (arrows) -->
          <polygon points="155,42 160,55 150,55" fill="#2c3e50"/>
          <polygon points="225,122 230,135 220,135" fill="#2c3e50"/>
          <text x="140" y="150" font-size="11" fill="#666">Ray CH and Ray CK</text>
        </svg>`;
      },
      // Q7: Acute angle
      Q7: function() {
        return `<svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="10" width="280" height="140" rx="10" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
          <line x1="60" y1="130" x2="210" y2="130" stroke="#2c3e50" stroke-width="2"/>
          <line x1="60" y1="130" x2="200" y2="40" stroke="#2c3e50" stroke-width="2"/>
          <path d="M 90 120 A 40 40 0 0 1 140 95" stroke="#e74c3c" stroke-width="2" fill="none"/>
          <text x="115" y="100" font-size="14" fill="#e74c3c" font-weight="bold">45°</text>
          <text x="140" y="150" font-size="12" fill="#666">Acute angle (less than 90°)</text>
        </svg>`;
      },
      // Q8: Right angle
      Q8: function() {
        return `<svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="10" width="280" height="140" rx="10" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
          <line x1="60" y1="130" x2="210" y2="130" stroke="#2c3e50" stroke-width="2"/>
          <line x1="60" y1="130" x2="60" y2="30" stroke="#2c3e50" stroke-width="2"/>
          <!-- Right angle square -->
          <rect x="60" y="110" width="20" height="20" fill="none" stroke="#e74c3c" stroke-width="2"/>
          <text x="80" y="100" font-size="14" fill="#e74c3c" font-weight="bold">90°</text>
          <text x="140" y="150" font-size="12" fill="#666">Right angle (exactly 90°)</text>
        </svg>`;
      },
      // Q9: Obtuse angle SUN = 150°
      Q9: function() {
        return `<svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="10" width="280" height="140" rx="10" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
          <!-- S-U-N angle -->
