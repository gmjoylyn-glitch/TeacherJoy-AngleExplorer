<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angle Arena · Boys vs Girls</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(145deg, #0b1a2e 0%, #1b2f47 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-wrapper {
      max-width: 1300px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      border-radius: 60px 60px 40px 40px;
      padding: 20px 25px 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 3px rgba(255,255,255,0.1);
      border: 1px solid rgba(255,215,0,0.2);
    }
    .scoreboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 80px;
      padding: 8px 25px 8px 25px;
      backdrop-filter: blur(6px);
      border: 1px solid #f7d44a;
      box-shadow: 0 0 15px #f7b32b55;
    }
    .team-score {
      display: flex;
      align-items: center;
      gap: 20px;
      font-weight: 700;
    }
    .team-badge {
      background: #202f44;
      padding: 6px 24px 6px 18px;
      border-radius: 40px;
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: #ffd966;
      box-shadow: inset 0 -2px 0 #f0b54a;
    }
    .team-badge.boys {
      background: #1b3b6b;
      border-left: 6px solid #3d9eff;
    }
    .team-badge.girls {
      background: #6b2f5c;
      border-left: 6px solid #ff7eb3;
    }
    .score-value {
      font-size: 2.3rem;
      font-family: 'Fredoka One', cursive;
      background: #0a141f;
      padding: 0 25px;
      border-radius: 50px;
      color: #fae67a;
      text-shadow: 0 0 10px #fabc2c;
      min-width: 110px;
      text-align: center;
      letter-spacing: 2px;
    }
    .score-value.boys-score { color: #7bb3ff; text-shadow: 0 0 12px #3d9eff; }
    .score-value.girls-score { color: #ff8ec4; text-shadow: 0 0 12px #ff4f9e; }

    .question-progress {
      font-size: 1rem;
      color: #b9d0f0;
      background: #0e1d2b;
      padding: 4px 20px;
      border-radius: 40px;
      font-weight: 600;
    }

    .game-grid {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .team-zone {
      flex: 1 1 280px;
      background: rgba(0,0,0,0.3);
      border-radius: 40px;
      padding: 18px 12px 20px;
      backdrop-filter: blur(2px);
      border: 1px solid #566b84;
      transition: all 0.3s;
      box-shadow: 0 8px 0 #111d2b;
      position: relative;
    }
    .team-zone.boys-zone { border-top: 6px solid #3d9eff; }
    .team-zone.girls-zone { border-top: 6px solid #ff7eb3; }
    
    .team-zone.team-winner {
      border-color: #ffd700;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
    }
    
    .team-zone.team-locked {
      opacity: 0.7;
      filter: grayscale(0.3);
    }
    
    .zone-title {
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      color: #e0eefe;
      letter-spacing: 2px;
      padding-bottom: 6px;
      border-bottom: 2px dashed #456a8f;
      margin-bottom: 15px;
    }
    .zone-title.boys-title { color: #9ac7ff; }
    .zone-title.girls-title { color: #ffb3d1; }

    .question-area {
      background: #1c2a3b;
      border-radius: 28px;
      padding: 18px 12px 12px;
      margin-bottom: 20px;
      box-shadow: inset 0 -4px 0 #0e1a26;
    }
    .q-text {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f0f7ff;
      background: #14212f;
      padding: 12px 14px;
      border-radius: 40px;
      text-align: center;
      margin-bottom: 12px;
      border: 1px solid #4b6f8f;
    }
    .diagram-container {
      background: #f2f6fc;
      border-radius: 24px;
      padding: 12px 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 180px;
      border: 2px solid #b9cfec;
    }
    .diagram-container svg {
      max-width: 100%;
      max-height: 170px;
      border-radius: 8px;
      background: white;
    }
    .diagram-placeholder {
      font-size: 1.2rem;
      color: #2b4a6b;
      font-weight: 600;
      padding: 10px;
      text-align: center;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 16px 0 12px;
    }
    .choice-btn {
      background: #2f4057;
      border: none;
      border-radius: 50px;
      padding: 14px 8px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #f0faff;
      text-align: center;
      box-shadow: 0 5px 0 #121e2b;
      transition: all 0.08s linear;
      cursor: pointer;
      letter-spacing: 0.5px;
      border: 1px solid #6f8aa8;
      position: relative;
    }
    .choice-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #121e2b;
    }
    .choice-btn.disabled {
      opacity: 0.5;
      pointer-events: none;
      filter: grayscale(0.6);
    }
    .choice-btn.correct-reveal {
      background: #2a9d8f;
      border-color: #b8f2e6;
      box-shadow: 0 0 20px #2a9d8faa;
      animation: pulse-green 0.5s ease-in-out;
    }
    .choice-btn.wrong-reveal {
      background: #b13e4b;
      border-color: #ffb3b3;
      animation: pulse-red 0.5s ease-in-out;
    }
    
    @keyframes pulse-green {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); background: #35b5a5; }
    }
    @keyframes pulse-red {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); background: #d14552; }
    }

    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .roll-score-btn {
      background: #f5b042;
      border: none;
      border-radius: 40px;
      padding: 12px 18px;
      font-weight: 800;
      font-size: 1.2rem;
      color: #1a1f2b;
      box-shadow: 0 5px 0 #9e6d28;
      flex: 1;
      transition: 0.06s linear;
      cursor: pointer;
      text-shadow: 0 1px 0 #ffe18f;
      border: 1px solid #ffe28b;
    }
    .roll-score-btn:active {
      transform: translateY(5px);
      box-shadow: 0 0 0 #9e6d28;
    }
    .roll-score-btn:disabled {
      opacity: 0.5;
      transform: translateY(3px);
      box-shadow: 0 2px 0 #6e4d1e;
      pointer-events: none;
    }
    .next-btn {
      background: #48a0d6;
      border: none;
      border-radius: 40px;
      padding: 12px 22px;
      font-weight: 800;
      font-size: 1.1rem;
      color: #0d1f2e;
      box-shadow: 0 5px 0 #1f5a7a;
      cursor: pointer;
      transition: 0.06s linear;
      border: 1px solid #8fcbff;
      flex: 1;
    }
    .next-btn:active {
      transform: translateY(5px);
      box-shadow: 0 0 0 #1f5a7a;
    }
    .next-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .roll-display {
      background: #0b1a28;
      border-radius: 40px;
      padding: 6px 20px;
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffd966;
      min-width: 110px;
      text-align: center;
      border: 1px solid #f7c948;
      font-family: 'Fredoka One', cursive;
    }

    .turn-indicator {
      text-align: center;
      margin-top: 8px;
      font-weight: 600;
      color: #bdd4f0;
      background: #142433;
      border-radius: 40px;
      padding: 8px;
      font-size: 1rem;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .turn-indicator.team-correct {
      background: #1a5a4a;
      color: #8fffd6;
      border: 1px solid #2a9d8f;
    }
    .turn-indicator.team-wrong {
      background: #5a2a2a;
      color: #ffb3b3;
      border: 1px solid #b13e4b;
    }
    .turn-indicator.team-waiting {
      background: #1a2a4a;
      color: #8fcbff;
      border: 1px solid #3d9eff;
      animation: pulse-blue 1s ease-in-out infinite;
    }
    
    @keyframes pulse-blue {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; background: #1a3a6a; }
    }

    .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .timer-display {
      font-size: 1.8rem;
      font-weight: 700;
      color: #ff6b6b;
      background: #1a0a0a;
      padding: 0 20px;
      border-radius: 40px;
      border: 2px solid #ff4444;
      min-width: 60px;
      text-align: center;
      font-family: 'Fredoka One', cursive;
    }
    .timer-display.urgent {
      animation: blink-red 0.5s ease-in-out infinite;
    }
    @keyframes blink-red {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (max-width: 850px) {
      .scoreboard { flex-direction: column; align-items: stretch; gap: 10px; }
      .team-score { justify-content: center; }
    }
    .hidden { display: none; }

    /* Music toggle button */
    .music-toggle {
      background: rgba(255,255,255,0.1);
      border: 1px solid #f7d44a;
      border-radius: 40px;
      padding: 6px 16px;
      color: #ffd966;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }
    .music-toggle:hover {
      background: rgba(255,215,0,0.2);
    }
  </style>
</head>
<body>
<div class="game-wrapper" id="app">
  <div class="scoreboard">
    <div class="team-score">
      <span class="team-badge boys">⚔️ BOYS</span>
      <span class="score-value boys-score" id="boysTotal">0</span>
    </div>
    <div style="display:flex; gap:15px; align-items:center;">
      <span class="question-progress" id="questionProgress">Q1/15</span>
      <span class="timer-display" id="timerDisplay">15s</span>
      <button class="music-toggle" id="musicToggle">🔊 Music</button>
    </div>
    <div class="team-score">
      <span class="team-badge girls">🌸 GIRLS</span>
      <span class="score-value girls-score" id="girlsTotal">0</span>
    </div>
  </div>

  <div class="game-grid">
    <div class="team-zone boys-zone" id="boysZone">
      <div class="zone-title boys-title">⚡ BOYS</div>
      <div class="question-area" id="boysQuestionArea">
        <div class="q-text" id="boysQtext">Question loads here</div>
        <div class="diagram-container" id="boysDiagram"><div class="diagram-placeholder">📐 Diagram</div></div>
      </div>
      <div class="choices" id="boysChoices"></div>
      <div class="action-row">
        <button class="roll-score-btn" id="boysRollBtn">🎲 ROLL SCORE</button>
        <span class="roll-display" id="boysRollDisplay">0</span>
        <button class="next-btn" id="boysNextBtn">⏩ NEXT</button>
      </div>
      <div class="turn-indicator" id="boysStatus">✅ ready</div>
    </div>

    <div class="team-zone girls-zone" id="girlsZone">
      <div class="zone-title girls-title">🌸 GIRLS</div>
      <div class="question-area" id="girlsQuestionArea">
        <div class="q-text" id="girlsQtext">Question loads here</div>
        <div class="diagram-container" id="girlsDiagram"><div class="diagram-placeholder">📐 Diagram</div></div>
      </div>
      <div class="choices" id="girlsChoices"></div>
      <div class="action-row">
        <button class="roll-score-btn" id="girlsRollBtn">🎲 ROLL SCORE</button>
        <span class="roll-display" id="girlsRollDisplay">0</span>
        <button class="next-btn" id="girlsNextBtn">⏩ NEXT</button>
      </div>
      <div class="turn-indicator" id="girlsStatus">✅ ready</div>
    </div>
  </div>
</div>

<script>
  (function() {
    // ============================================
    // AUDIO SYSTEM - Background Music & Sound FX
    // ============================================
    class AudioManager {
      constructor() {
        this.ctx = null;
        this.isMusicOn = true;
        this.musicInterval = null;
        this.musicOscillators = [];
        this.musicGain = null;
        this.initAudio();
      }

      initAudio() {
        try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {
          console.warn('Web Audio not supported');
        }
      }

      // Play a simple tone with duration
      playTone(freq, duration, type = 'square', volume = 0.15) {
        if (!this.ctx) return;
        try {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = type;
          osc.frequency.value = freq;
          gain.gain.value = volume;
          gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start();
          osc.stop(this.ctx.currentTime + duration);
          return osc;
        } catch(e) {
          return null;
        }
      }

      // Play a chord (victory sound)
      playChord() {
        if (!this.ctx) return;
        const notes = [523, 659, 784, 1047];
        notes.forEach((freq, i) => {
          setTimeout(() => {
            this.playTone(freq, 0.3, 'sine', 0.12);
          }, i * 100);
        });
      }

      // Correct answer sound - ascending happy tone
      playCorrect() {
        this.playTone(880, 0.15, 'sine', 0.15);
        setTimeout(() => this.playTone(1100, 0.2, 'sine', 0.15), 120);
        setTimeout(() => this.playTone(1320, 0.25, 'sine', 0.12), 250);
      }

      // Wrong answer sound - descending sad tone
      playWrong() {
        this.playTone(400, 0.2, 'sawtooth', 0.1);
        setTimeout(() => this.playTone(300, 0.25, 'sawtooth', 0.1), 150);
        setTimeout(() => this.playTone(200, 0.3, 'sawtooth', 0.08), 300);
      }

      // Victory fanfare
      playVictory() {
        if (!this.ctx) return;
        const melody = [523, 523, 523, 659, 784, 659, 784, 880];
        melody.forEach((freq, i) => {
          setTimeout(() => {
            this.playTone(freq, 0.2, 'square', 0.1);
          }, i * 130);
        });
        setTimeout(() => {
          this.playChord();
        }, 800);
      }

      // Score roll sound
      playRollTick() {
        this.playTone(600 + Math.random() * 400, 0.05, 'sine', 0.05);
      }

      // Timer warning
      playTimerTick() {
        this.playTone(440, 0.08, 'square', 0.08);
      }

      // Background Music - upbeat game music
      toggleMusic() {
        this.isMusicOn = !this.isMusicOn;
        if (this.isMusicOn) {
          this.startMusic();
        } else {
          this.stopMusic();
        }
        return this.isMusicOn;
      }

      startMusic() {
        if (this.musicInterval) return;
        if (!this.ctx) return;
        // Resume context if suspended
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
        
        let pattern = [
          { note: 523, dur: 0.15 }, // C5
          { note: 0, dur: 0.05 },
          { note: 587, dur: 0.15 }, // D5
          { note: 0, dur: 0.05 },
          { note: 659, dur: 0.15 }, // E5
          { note: 0, dur: 0.05 },
          { note: 523, dur: 0.2 }, // C5
          { note: 0, dur: 0.1 },
          { note: 523, dur: 0.15 }, // C5
          { note: 0, dur: 0.05 },
          { note: 587, dur: 0.15 }, // D5
          { note: 0, dur: 0.05 },
          { note: 659, dur: 0.15 }, // E5
          { note: 0, dur: 0.05 },
          { note: 523, dur: 0.2 }, // C5
          { note: 0, dur: 0.1 },
          { note: 523, dur: 0.15 }, // C5
          { note: 0, dur: 0.05 },
          { note: 587, dur: 0.15 }, // D5
          { note: 0, dur: 0.05 },
          { note: 659, dur: 0.15 }, // E5
          { note: 0, dur: 0.05 },
          { note: 523, dur: 0.2 }, // C5
          { note: 0, dur: 0.1 },
        ];

        let index = 0;
        const totalDuration = pattern.reduce((sum, p) => sum + p.dur + 0.02, 0);
        
        this.musicInterval = setInterval(() => {
          if (!this.isMusicOn) {
            this.stopMusic();
            return;
          }
          if (!this.ctx) return;
          
          const p = pattern[index % pattern.length];
          if (p.note > 0) {
            this.playTone(p.note, p.dur * 0.8, 'square', 0.04);
          }
          index++;
        }, 220);
      }

      stopMusic() {
        if (this.musicInterval) {
          clearInterval(this.musicInterval);
          this.musicInterval = null;
        }
      }
    }

    // Initialize audio
    const audio = new AudioManager();

    // ============================================
    // SVG DIAGRAM GENERATORS
    // ============================================
    const diagramGenerators = {

      },
      Q3: function() {
        return `<svg viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="10" width="280" height="130" rx="10" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
          <path d="M 30 110 A 80 80 0 0 1 210 110" stroke="#2c3e50" stroke-width="2" fill="none"/>
          <path d="M 30 110 L 210 110" stroke="#2c3e50" stroke-width="2"/>
          <path d="M 30 110 L 30 85" stroke="#e74c3c" stroke-width="3"/>
          <path d="M 210 110 L 210 85" stroke="#e74c3c" stroke-width="3"/>
          <text x="30" y="80" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">▲ Zero Edge</text>
          <text x="210" y="80" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">▲ Zero Edge</text>
          <text x="120" y="140" font-size="10" fill="#666" text-anchor="middle">Zero edges (indicated by arrows)</text>
        </svg>`;
      },
      Q4: function() {
        return `<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="10" width="280" height="160" rx="10" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>
          <line x1="60" y1="140" x2="140" y2="40" stroke="#2c3e50" stroke-width="2"/>
          <line x1="60" y1="140" x2="220" y2="140" stroke="#2c3e50" stroke-width="2"/>
          <path d="M 100 120 A 50 50 0 0 1 140 90" stroke="#e74c3c" stroke-width="2" fill="none"/>

    // ============================================
    // GAME LOGIC
    // ============================================
    const questions = [
      { q: "1) Name the part of protractor indicated by the arrow.", diagram: "Q1", choices: ["a) center mark", "b) degree mark", "c) zero edges"], correct: 0, time: 15 },
      { q: "2) Name the part of protractor indicated by the arrow.", diagram: "Q2", choices: ["a) center mark", "b) degree mark", "c) zero edges"], correct: 1, time: 15 },
      { q: "3) Name the part of protractor indicated by the arrow.", diagram: "Q3", choices: ["a) center mark", "b) degree mark", "c) zero edges"], correct: 2, time: 15 },
      { q: "4) Name the angle.", diagram: "Q4", choices: ["a) angle PQR", "b) angle RPQ", "c) angle QRP"], correct: 0, time: 15 },
      { q: "5) Name the vertex.", diagram: "Q5", choices: ["a) Dot N", "b) Angle N", "c) Point N or .N"], correct: 2, time: 15 },

      { q: "7) ……. is an angle measures bigger than 0° but smaller than 90°", diagram: "Q7", choices: ["a) Acute", "b) Right", "c) Obtuse"], correct: 0, time: 15 },
      { q: "8) What type of angle is 90°?", diagram: "Q8", choices: ["a) Acute", "b) Right", "c) Obtuse"], correct: 1, time: 15 },
      { q: "9) What type of angle is ∠SUN = 150° ?", diagram: "Q9", choices: ["a) Acute", "b) Right", "c) Obtuse"], correct: 2, time: 20 },
      { q: "10) ……. is an angle measures exactly 180°.", diagram: "Q10", choices: ["a) Right", "b) Obtuse", "c) Straight"], correct: 2, time: 20 },
      { q: "11) Look at the figure. How many acute angles?", diagram: "Q11", choices: ["a) 1", "b) 2", "c) 3"], correct: 1, time: 20 },
      { q: "12) Look at the figure. How many right angles?", diagram: "Q12", choices: ["a) 3", "b) 12", "c) 14"], correct: 1, time: 20 },
      { q: "13) Measure and read the angle shown.", diagram: "Q13", choices: ["a) 50°", "b) 105°", "c) 165°"], correct: 1, time: 30 },
      { q: "14) Find angle b̂.", diagram: "Q14", choices: ["a) 30°", "b) 42°", "c) 52°"], correct: 1, time: 30 },
      { q: "15) Find angle â.", diagram: "Q15", choices: ["a) 144°", "b) 180°", "c) 324°"], correct: 0, time: 30 }
    ];

    // GAME STATE
    let currentIndex = 0;
    let timerInterval = null;
    let timerSeconds = 0;
    let gameLocked = false;
    
    const teams = {
      boys: { score: 0, answered: false, lock: false, timer: null, rollActive: false, rollInterval: null, rollValue: 0, choiceLocked: false },
      girls: { score: 0, answered: false, lock: false, timer: null, rollActive: false, rollInterval: null, rollValue: 0, choiceLocked: false }
    };
    let boysTotal = 0, girlsTotal = 0;

    // DOM refs
    const boysQtext = document.getElementById('boysQtext');
    const girlsQtext = document.getElementById('girlsQtext');
    const boysDiagram = document.getElementById('boysDiagram');
    const girlsDiagram = document.getElementById('girlsDiagram');
    const boysChoices = document.getElementById('boysChoices');
    const girlsChoices = document.getElementById('girlsChoices');
    const boysStatus = document.getElementById('boysStatus');
    const girlsStatus = document.getElementById('girlsStatus');
    const boysRollBtn = document.getElementById('boysRollBtn');
    const girlsRollBtn = document.getElementById('girlsRollBtn');
    const boysRollDisplay = document.getElementById('boysRollDisplay');
    const girlsRollDisplay = document.getElementById('girlsRollDisplay');
    const boysNextBtn = document.getElementById('boysNextBtn');
    const girlsNextBtn = document.getElementById('girlsNextBtn');
    const boysTotalSpan = document.getElementById('boysTotal');
    const girlsTotalSpan = document.getElementById('girlsTotal');
    const timerDisplay = document.getElementById('timerDisplay');
    const questionProgress = document.getElementById('questionProgress');
    const boysZone = document.getElementById('boysZone');
    const girlsZone = document.getElementById('girlsZone');
    const musicToggle = document.getElementById('musicToggle');

    // Music toggle
    musicToggle.addEventListener('click', function() {
      const isOn = audio.toggleMusic();
      this.textContent = isOn ? '🔊 Music' : '🔇 Muted';
    });

    // Start background music after user interaction
    document.addEventListener('click', function initAudio() {
      audio.startMusic();
      document.removeEventListener('click', initAudio);
    }, { once: true });

    function startTimer(seconds) {
      clearInterval(timerInterval);
      timerSeconds = seconds;
      timerDisplay.textContent = seconds + 's';
      timerDisplay.classList.remove('urgent');
      
      timerInterval = setInterval(() => {
        timerSeconds--;
        timerDisplay.textContent = timerSeconds + 's';
        if (timerSeconds <= 5 && timerSeconds > 0) {
          timerDisplay.classList.add('urgent');
          audio.playTimerTick();
        }
        if (timerSeconds <= 0) {
          clearInterval(timerInterval);
          timerDisplay.textContent = '⏰';
          if (!teams.boys.answered && !teams.girls.answered) {
            lockBothTeams('⏰ Time\'s up!');
          }
        }
      }, 1000);
    }

    function lockBothTeams(message) {
      teams.boys.lock = true;
      teams.girls.lock = true;
      teams.boys.answered = true;
      teams.girls.answered = true;
      boysChoices.querySelectorAll('.choice-btn').forEach(b => b.classList.add('disabled'));
      girlsChoices.querySelectorAll('.choice-btn').forEach(b => b.classList.add('disabled'));
      boysStatus.textContent = message;
      girlsStatus.textContent = message;
      boysStatus.className = 'turn-indicator team-wrong';
      girlsStatus.className = 'turn-indicator team-wrong';
      setTimeout(() => {
        boysNextBtn.disabled = false;
        girlsNextBtn.disabled = false;
      }, 1000);
    }

    function renderQuestion(index) {
      const q = questions[index];
      if (!q) return;
      
      questionProgress.textContent = `Q${index+1}/${questions.length}`;
      
      boysQtext.textContent = q.q;
      girlsQtext.textContent = q.q;
      
      // Use SVG diagrams
      const svgContent = diagramGenerators[q.diagram] ? diagramGenerators[q.diagram]() : `<div class="diagram-placeholder">📐 Diagram: ${q.diagram}</div>`;
      boysDiagram.innerHTML = svgContent;
      girlsDiagram.innerHTML = svgContent;

      renderChoices('boys', q.choices, q.correct);
      renderChoices('girls', q.choices, q.correct);

      teams.boys.answered = false;
      teams.girls.answered = false;
      teams.boys.lock = false;
      teams.girls.lock = false;
      teams.boys.choiceLocked = false;
      teams.girls.choiceLocked = false;
      
      boysStatus.textContent = '⏳ Tap answer!';
      girlsStatus.textContent = '⏳ Tap answer!';
      boysStatus.className = 'turn-indicator team-waiting';
      girlsStatus.className = 'turn-indicator team-waiting';
      
      boysZone.classList.remove('team-winner', 'team-locked');
      girlsZone.classList.remove('team-winner', 'team-locked');
      
      boysRollBtn.disabled = true;
      girlsRollBtn.disabled = true;
      boysNextBtn.disabled = true;
      girlsNextBtn.disabled = true;
      
      boysRollDisplay.textContent = '0';
      girlsRollDisplay.textContent = '0';
      teams.boys.rollActive = false;
      teams.girls.rollActive = false;
      if (teams.boys.rollInterval) clearInterval(teams.boys.rollInterval);
      if (teams.girls.rollInterval) clearInterval(teams.girls.rollInterval);
      
      startTimer(q.time);
    }

    function renderChoices(team, choiceTexts, correctIdx) {
      const container = team === 'boys' ? boysChoices : girlsChoices;
      container.innerHTML = '';
      choiceTexts.forEach((text, idx) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = text;
        btn.dataset.idx = idx;
        btn.dataset.correct = correctIdx;
        btn.addEventListener('click', (e) => handleChoice(team, idx, correctIdx, btn));
        container.appendChild(btn);
      });
    }

    function handleChoice(team, idx, correctIdx, btnEl) {
      const state = teams[team];
      if (state.lock || state.answered || gameLocked) return;
      
      const other = team === 'boys' ? 'girls' : 'boys';
      if (teams[other].answered && teams[other].lock) {
        state.lock = true;
        return;
      }
      
      state.lock = true;
      state.answered = true;
      const isCorrect = (idx === correctIdx);
      
      const allBtns = team === 'boys' ? boysChoices.querySelectorAll('.choice-btn') : girlsChoices.querySelectorAll('.choice-btn');
      allBtns.forEach(b => b.classList.add('disabled'));
      
      if (isCorrect) {
        btnEl.classList.add('correct-reveal');
        audio.playCorrect();
        setTimeout(() => audio.playVictory(), 300);
        
        if (team === 'boys') {
          boysRollBtn.disabled = false;
          boysStatus.textContent = '🎯 Correct! Roll score!';
          boysStatus.className = 'turn-indicator team-correct';
          boysZone.classList.add('team-winner');
          girlsZone.classList.add('team-locked');
        } else {
          girlsRollBtn.disabled = false;
          girlsStatus.textContent = '🎯 Correct! Roll score!';
          girlsStatus.className = 'turn-indicator team-correct';
          girlsZone.classList.add('team-winner');
          boysZone.classList.add('team-locked');
        }
        
        teams[other].lock = true;
        teams[other].answered = true;
        const otherBtns = other === 'boys' ? boysChoices.querySelectorAll('.choice-btn') : girlsChoices.querySelectorAll('.choice-btn');
        otherBtns.forEach(b => b.classList.add('disabled'));
        if (other === 'boys') {
          boysStatus.textContent = '⛔ Opponent answered first';
          boysStatus.className = 'turn-indicator team-wrong';
        } else {
          girlsStatus.textContent = '⛔ Opponent answered first';
          girlsStatus.className = 'turn-indicator team-wrong';
        }
        
        clearInterval(timerInterval);
        timerDisplay.textContent = '✅';
        
      } else {
        btnEl.classList.add('wrong-reveal');
        audio.playWrong();
        
        if (team === 'boys') {
          boysStatus.textContent = '❌ Wrong! Other team can try';
          boysStatus.className = 'turn-indicator team-wrong';
        } else {
          girlsStatus.textContent = '❌ Wrong! Other team can try';
          girlsStatus.className = 'turn-indicator team-wrong';
        }
        
        if (!teams[other].answered) {
          if (other === 'boys') {
            boysStatus.textContent = '⏳ Still your chance!';
            boysStatus.className = 'turn-indicator team-waiting';
          } else {
            girlsStatus.textContent = '⏳ Still your chance!';
            girlsStatus.className = 'turn-indicator team-waiting';
          }
        }
        
        if (teams[other].answered && teams[other].lock) {
          if (other === 'boys') {
            boysRollBtn.disabled = false;
            boysStatus.textContent = '🎯 Opponent correct! Roll!';
            boysStatus.className = 'turn-indicator team-correct';
          } else {
            girlsRollBtn.disabled = false;
            girlsStatus.textContent = '🎯 Opponent correct! Roll!';
            girlsStatus.className = 'turn-indicator team-correct';
          }
        }
      }
    }

    function initRoll(team) {
      const state = teams[team];
      if (state.rollActive) return;
      state.rollActive = true;
      const display = team === 'boys' ? boysRollDisplay : girlsRollDisplay;
      const btn = team === 'boys' ? boysRollBtn : girlsRollBtn;
      btn.disabled = true;
      
      const pool = [1000,2000,3000,4000,5000,-1000,-2000,-3000,-5000,10000,20000,50000];
      let interval = setInterval(() => {
        const val = pool[Math.floor(Math.random() * pool.length)];
        display.textContent = val;
        state.rollValue = val;
        audio.playRollTick();
      }, 120);
      state.rollInterval = interval;
      
      btn.textContent = '⏹️ STOP';
      btn.disabled = false;
      btn.onclick = function stopRoll() {
        if (!state.rollActive) return;
        clearInterval(state.rollInterval);
        state.rollActive = false;
        const finalVal = parseInt(display.textContent) || 0;
        
        if (team === 'boys') { 
          boysTotal += finalVal; 
          boysTotalSpan.textContent = boysTotal;
          boysStatus.textContent = `➕ +${finalVal} points!`;
        } else { 
          girlsTotal += finalVal; 
          girlsTotalSpan.textContent = girlsTotal;
          girlsStatus.textContent = `➕ +${finalVal} points!`;
        }
        audio.playChord();
        
        btn.textContent = '🎲 ROLL SCORE';
        btn.disabled = true;
        btn.onclick = null;
        
        boysNextBtn.disabled = false;
        girlsNextBtn.disabled = false;
        
        const other = team === 'boys' ? 'girls' : 'boys';
        if (teams[other].answered && teams[other].lock && !teams[other].rollActive) {
          if (other === 'boys' && boysRollBtn.disabled) { 
            boysRollBtn.disabled = false; 
            boysStatus.textContent = '🎲 Roll now!';
          } else if (other === 'girls' && girlsRollBtn.disabled) { 
            girlsRollBtn.disabled = false; 
            girlsStatus.textContent = '🎲 Roll now!';
          }
        }
      };
    }

    boysRollBtn.addEventListener('click', function(e) {
      if (teams.boys.rollActive) return;
      if (!teams.boys.answered || teams.boys.lock === false) return;
      initRoll('boys');
    });
    girlsRollBtn.addEventListener('click', function(e) {
      if (teams.girls.rollActive) return;
      if (!teams.girls.answered || teams.girls.lock === false) return;
      initRoll('girls');
    });

    function goNext() {
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion(currentIndex);
        boysChoices.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('disabled'));
        girlsChoices.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('disabled'));
        boysRollBtn.disabled = true;
        girlsRollBtn.disabled = true;
        boysNextBtn.disabled = true;
        girlsNextBtn.disabled = true;
        boysRollDisplay.textContent = '0';
        girlsRollDisplay.textContent = '0';
        boysZone.classList.remove('team-winner', 'team-locked');
        girlsZone.classList.remove('team-winner', 'team-locked');
      } else {
        boysStatus.textContent = '🏆 GAME OVER! 🏆';
        girlsStatus.textContent = '🏆 GAME OVER! 🏆';
        boysStatus.className = 'turn-indicator team-correct';
        girlsStatus.className = 'turn-indicator team-correct';
        boysNextBtn.disabled = true;
        girlsNextBtn.disabled = true;
        audio.playVictory();
        setTimeout(() => audio.playVictory(), 800);
        setTimeout(() => audio.playVictory(), 1600);
      }
    }
    boysNextBtn.addEventListener('click', goNext);
    girlsNextBtn.addEventListener('click', goNext);

    // INIT
    renderQuestion(0);
    boysChoices.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('disabled'));
    girlsChoices.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('disabled'));
    boysNextBtn.disabled = true;
    girlsNextBtn.disabled = true;
    boysRollBtn.disabled = true;
    girlsRollBtn.disabled = true;

  })();
</script>
</body>
</html>
