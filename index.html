<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Angle Arena · Boys vs Girls</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      background: linear-gradient(145deg, #0b1a2e 0%, #1b2f47 100%);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .game-container {
      max-width: 1300px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(4px);
      border-radius: 72px 72px 48px 48px;
      padding: 24px 28px 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.03);
    }

    /* scoreboard */
    .scoreboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 60px;
      padding: 12px 30px;
      margin-bottom: 24px;
      backdrop-filter: blur(8px);
      border: 1px solid #ffd96655;
      box-shadow: 0 6px 0 #0f1a26;
    }
    .team-score {
      display: flex;
      align-items: center;
      gap: 20px;
      font-weight: 700;
      font-size: 1.8rem;
      text-shadow: 0 2px 0 #00000055;
    }
    .team-badge {
      background: #1e3347;
      padding: 6px 24px 6px 20px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 1px;
      box-shadow: inset 0 -3px 0 #0b1620;
    }
    .team-badge.boys { background: #2c5f8a; color: #b3e0ff; }
    .team-badge.girls { background: #a13d6b; color: #ffd1e6; }
    .score-number {
      min-width: 90px;
      background: #0c1a26;
      padding: 4px 18px;
      border-radius: 40px;
      text-align: center;
      color: #f5e56b;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 1px;
      box-shadow: inset 0 2px 6px #00000099;
    }

    /* question panel */
    .question-panel {
      background: #182b3b;
      border-radius: 48px;
      padding: 24px 30px 20px;
      margin-bottom: 20px;
      border: 1px solid #4d6b85;
      box-shadow: inset 0 0 0 1px #2d4a62, 0 10px 0 #0b171f;
    }
    .q-text {
      color: #eaf2fa;
      font-size: 1.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .q-badge {
      background: #f5c542;
      color: #0f1f2b;
      padding: 0 20px;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 800;
      line-height: 2.2rem;
    }
    .diagram-area {
      background: #0f202e;
      border-radius: 32px;
      margin: 18px 0 14px;
      padding: 20px 20px 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 160px;
      border: 1px solid #3a5b75;
      box-shadow: inset 0 4px 12px #00000066;
    }
    .diagram-area img {
      max-width: 100%;
      max-height: 200px;
      object-fit: contain;
      filter: drop-shadow(0 6px 8px #00000088);
      border-radius: 16px;
    }
    .diagram-placeholder {
      color: #9bb7d0;
      font-size: 1.2rem;
      background: #1d3345;
      padding: 24px 40px;
      border-radius: 30px;
      letter-spacing: 1px;
      border: 1px dashed #5b7f9a;
      text-align: center;
    }
    .diagram-placeholder svg {
      display: block;
      margin: 0 auto 8px;
    }

    /* choices */
    .choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px 40px;
      margin: 20px 0 18px;
    }
    .choice-btn {
      background: #213d52;
      border: none;
      padding: 16px 40px;
      border-radius: 60px;
      font-size: 1.8rem;
      font-weight: 700;
      color: #dcebf5;
      box-shadow: 0 8px 0 #0c1a26, 0 6px 12px #00000077;
      transition: 0.06s linear;
      cursor: pointer;
      min-width: 140px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #547c9b;
      letter-spacing: 1px;
    }
    .choice-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #0c1a26; }
    .choice-btn.disabled {
      opacity: 0.5;
      filter: grayscale(0.6);
      pointer-events: none;
      transform: scale(0.97);
    }
    .choice-btn.correct-highlight { background: #2b8c5e; border-color: #90e0b0; box-shadow: 0 0 16px #59d98a; }
    .choice-btn.wrong-highlight { background: #a13d3d; border-color: #ff8888; }

    /* action bar */
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px 10px;
      margin: 16px 0 10px;
    }
    .next-btn, .roll-btn {
      background: #eab33a;
      border: none;
      padding: 14px 40px;
      border-radius: 80px;
      font-weight: 800;
      font-size: 1.6rem;
      color: #111f2b;
      box-shadow: 0 8px 0 #7a5f1f, 0 6px 12px #00000088;
      transition: 0.07s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #fad673;
    }
    .next-btn:active, .roll-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #7a5f1f; }
    .next-btn:disabled, .roll-btn:disabled { opacity: 0.4; transform: translateY(4px); box-shadow: 0 4px 0 #7a5f1f; pointer-events: none; }
    .roll-btn { background: #5f8bb3; box-shadow: 0 8px 0 #2a4a66; color: white; border-color: #97c0e0; }
    .roll-btn:active { box-shadow: 0 3px 0 #2a4a66; }

    .timer-area {
      background: #0b1c29;
      padding: 6px 22px;
      border-radius: 80px;
      font-size: 1.8rem;
      font-weight: 700;
      color: #ffd966;
      border: 1px solid #c9a04b;
    }
    .roll-popup {
      background: #1f3b4e;
      border-radius: 60px;
      padding: 8px 28px;
      font-size: 2.2rem;
      font-weight: 800;
      color: #fae074;
      box-shadow: inset 0 0 12px #00000099;
      border: 1px solid #f1c75b;
      min-width: 130px;
      text-align: center;
    }
    .footnote {
      color: #7f9bb3;
      text-align: center;
      margin-top: 16px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    @media (max-width: 800px) {
      .game-container { padding: 16px; }
      .choice-btn { min-width: 100px; padding: 12px 20px; font-size: 1.3rem; }
      .q-text { font-size: 1.4rem; }
      .score-number { min-width: 60px; font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div class="game-container" id="app">
  <div class="scoreboard">
    <div class="team-score"><span class="team-badge boys">👦 BOYS</span><span class="score-number" id="boysScore">0</span></div>
    <div class="team-score"><span class="team-badge girls">👧 GIRLS</span><span class="score-number" id="girlsScore">0</span></div>
  </div>

  <div class="question-panel">
    <div class="q-text"><span class="q-badge" id="qNumber">Q1</span> <span id="qText">Loading...</span></div>
    <div class="diagram-area" id="diagramContainer">
      <div class="diagram-placeholder">📐 diagram</div>
    </div>
    <div class="choices" id="choicesContainer">
      <button class="choice-btn" data-choice="a">A</button>
      <button class="choice-btn" data-choice="b">B</button>
      <button class="choice-btn" data-choice="c">C</button>
    </div>
    <div class="action-bar">
      <div class="timer-area" id="timerDisplay">⏱️ 15s</div>
      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <button class="roll-btn" id="rollScoreBtn">🎲 Roll Score</button>
        <span class="roll-popup" id="rollPopup">⚡0</span>
        <button class="next-btn" id="nextBtn">➡️ Next</button>
      </div>
    </div>
  </div>
  <div class="footnote">⚡ tap A / B / C · first correct locks · roll after reveal!</div>
</div>
<script>
  (function(){
    // ---------- QUESTIONS with diagram generators ----------
    const questions = [
      { q: "Name the part of protractor indicated by the arrow.", diagram: "Q1.jpg", choices: ["a center mark", "a degree mark", "zero edges"], correct: 0 },
      { q: "Name the part of protractor indicated by the arrow.", diagram: "Q2.jpg", choices: ["a center mark", "a degree mark", "zero edges"], correct: 1 },
      { q: "Name the part of protractor indicated by the arrow.", diagram: "Q3.jpg", choices: ["a center mark", "a degree mark", "zero edges"], correct: 2 },
      { q: "Name the angle.", diagram: "Q4.jpg", choices: ["PQ̂R", "RP̂Q", "QR̂P"], correct: 0 },
      { q: "Name the vertex.", diagram: "Q5.jpg", choices: ["Dot N", "Angle N", "Point N or .N"], correct: 2 },
      { q: "Name the arms.", diagram: "Q6.jpg", choices: ["(CH)̅ and (CK)̅", "(HC)⃗ and (KC)⃗", "(CH)⃗ and (CK)⃗"], correct: 2 },
      { q: "……. is an angle measures bigger than 0° but smaller than 90°", diagram: "Q7.jpg", choices: ["Acute angle", "Right angle", "Obtuse angle"], correct: 0 },
      { q: "What type of angle is shown in the diagram?", diagram: "Q8.jpg", choices: ["Acute angle", "Right angle", "Obtuse angle"], correct: 1 },
      { q: "What type of angle is SÛN = 150° ?", diagram: "Q9.jpg", choices: ["Acute angle", "Right angle", "Obtuse angle"], correct: 2 },
      { q: "……. is an angle measures exactly 180°.", diagram: "Q10.jpg", choices: ["Right angle", "Obtuse angle", "Straight angle"], correct: 2 },
      { q: "Look at the figure. How many acute angles are there?", diagram: "Q11.jpg", choices: ["1", "2", "3"], correct: 1 },
      { q: "Look at the figure. How many right angles?", diagram: "Q12.jpg", choices: ["3", "12", "14"], correct: 1 },
      { q: "Measure and read the angle shown in the diagram.", diagram: "Q13.jpg", choices: ["50°", "105°", "165°"], correct: 1 },
      { q: "Find angle b̂.", diagram: "Q14.jpg", choices: ["30°", "42°", "52°"], correct: 1 },
      { q: "Find angle â.", diagram: "Q15.jpg", choices: ["144°", "180°", "324°"], correct: 0 }
    ];

    // ---------- SVG placeholders for missing images ----------
    function getDiagramHTML(filename) {
      // if we have the actual image, use it
      if (['Q1.jpg','Q3.jpg','Q4.jpg','Q5.jpg','Q6.jpg','Q8.jpg','Q9.jpg','Q10.jpg','Q12.jpg','Q13.jpg','Q14.jpg'].includes(filename)) {
        return `<img src="${filename}" alt="diagram" onerror="this.parentElement.innerHTML=\`<div class='diagram-placeholder'>📐 ${filename} not found</div>\`">`;
      }
      // built-in placeholders
      if (filename === 'Q2.jpg') {
        return `<div class="diagram-placeholder">
          <svg width="180" height="100" viewBox="0 0 180 100"><rect x="10" y="10" width="160" height="80" fill="#1f3a4b" stroke="#7aa5c2" stroke-width="2" rx="10"/>
          <line x1="30" y1="50" x2="150" y2="50" stroke="#ffd966" stroke-width="3" />
          <circle cx="90" cy="50" r="6" fill="#f5c542" />
          <text x="40" y="30" fill="#b3d9f0" font-size="14">⬆ arrow</text>
          <text x="100" y="80" fill="#d4e8f5" font-size="12">degree marks</text>
          </div>`;
      }
      if (filename === 'Q7.jpg') {
        return `<div class="diagram-placeholder">
          <svg width="140" height="100" viewBox="0 0 140 100"><rect x="10" y="10" width="120" height="80" fill="#1f3a4b" stroke="#7aa5c2" stroke-width="2" rx="10"/>
          <line x1="20" y1="80" x2="70" y2="20" stroke="#ffd966" stroke-width="3" />
          <line x1="20" y1="80" x2="110" y2="80" stroke="#ffd966" stroke-width="3" />
          <circle cx="20" cy="80" r="5" fill="#f5c542" />
          <text x="30" y="50" fill="#b3d9f0" font-size="14">acute</text>
          <text x="80" y="85" fill="#d4e8f5" font-size="12">45°</text>
          </div>`;
      }
      if (filename === 'Q11.jpg') {
        return `<div class="diagram-placeholder">
          <svg width="160" height="100" viewBox="0 0 160 100"><rect x="10" y="10" width="140" height="80" fill="#1f3a4b" stroke="#7aa5c2" stroke-width="2" rx="10"/>
          <line x1="30" y1="70" x2="70" y2="30" stroke="#ffd966" stroke-width="3" />
          <line x1="70" y1="30" x2="110" y2="70" stroke="#ffd966" stroke-width="3" />
          <line x1="110" y1="70" x2="130" y2="40" stroke="#ffd966" stroke-width="3" />
          <circle cx="30" cy="70" r="4" fill="#f5c542"/><circle cx="70" cy="30" r="4" fill="#f5c542"/><circle cx="110" cy="70" r="4" fill="#f5c542"/>
          <text x="40" y="20" fill="#b3d9f0" font-size="12">2 acute</text>
          </div>`;
      }
      if (filename === 'Q15.jpg') {
        return `<div class="diagram-placeholder">
          <svg width="160" height="100" viewBox="0 0 160 100"><rect x="10" y="10" width="140" height="80" fill="#1f3a4b" stroke="#7aa5c2" stroke-width="2" rx="10"/>
          <line x1="30" y1="80" x2="80" y2="20" stroke="#ffd966" stroke-width="3" />
          <line x1="80" y1="20" x2="130" y2="80" stroke="#ffd966" stroke-width="3" />
          <circle cx="30" cy="80" r="5" fill="#f5c542"/>
          <circle cx="80" cy="20" r="5" fill="#f5c542"/>
          <circle cx="130" cy="80" r="5" fill="#f5c542"/>
          <text x="50" y="50" fill="#b3d9f0" font-size="14">â = 144°</text>
          </div>`;
      }
      return `<div class="diagram-placeholder">📐 ${filename} (placeholder)</div>`;
    }

    // ---------- STATE ----------
    let currentIndex = 0;
    let boysScore = 0, girlsScore = 0;
    let timer = 15;
    let timerInterval = null;
    let questionLocked = false;
    let correctAnswerIndex = -1;
    let selectedTeam = null; // 'boys' or 'girls'
    let rollInterval = null;
    let rollActive = false;
    let currentRollValue = 0;

    const qNumberEl = document.getElementById('qNumber');
    const qTextEl = document.getElementById('qText');
    const diagramContainer = document.getElementById('diagramContainer');
    const choicesBtns = document.querySelectorAll('.choice-btn');
    const timerDisplay = document.getElementById('timerDisplay');
    const boysScoreEl = document.getElementById('boysScore');
    const girlsScoreEl = document.getElementById('girlsScore');
    const nextBtn = document.getElementById('nextBtn');
    const rollBtn = document.getElementById('rollScoreBtn');
    const rollPopup = document.getElementById('rollPopup');

    function updateScoresUI() {
      boysScoreEl.textContent = boysScore;
      girlsScoreEl.textContent = girlsScore;
    }

    function speakText(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.9;
        utterance.pitch = 1;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      }
    }

    function highlightCorrect() {
      choicesBtns.forEach(btn => {
        btn.classList.add('disabled');
        if (btn.dataset.correct === 'true') btn.classList.add('correct-highlight');
      });
      const q = questions[currentIndex];
      if (q) speakText(`Correct answer: ${q.choices[correctAnswerIndex]}`);
    }

    function loadQuestion(index) {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      questionLocked = false;
      selectedTeam = null;
      rollActive = false;
      if (rollInterval) { clearInterval(rollInterval); rollInterval = null; }
      rollPopup.textContent = '⚡0';
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('correct-highlight', 'wrong-highlight', 'disabled'));

      const q = questions[index];
      qNumberEl.textContent = `Q${index+1}`;
      qTextEl.textContent = q.q;
      // diagram
      diagramContainer.innerHTML = getDiagramHTML(q.diagram || '');
      
      choicesBtns.forEach((btn, idx) => {
        btn.textContent = String.fromCharCode(65 + idx) + '. ' + q.choices[idx];
        btn.dataset.correct = (idx === q.correct) ? 'true' : 'false';
        btn.classList.remove('disabled');
      });
      correctAnswerIndex = q.correct;

      let seconds = 15;
      if (index >= 5 && index < 10) seconds = 20;
      else if (index >= 10) seconds = 30;
      timer = seconds;
      timerDisplay.textContent = `⏱️ ${timer}s`;

      timerInterval = setInterval(() => {
        timer--;
        timerDisplay.textContent = `⏱️ ${timer}s`;
        if (timer <= 0) {
          clearInterval(timerInterval);
          timerInterval = null;
          timerDisplay.textContent = `⏱️ 0s`;
          if (!questionLocked) {
            questionLocked = true;
            highlightCorrect();
            rollBtn.disabled = false;
          }
        }
      }, 1000);

      rollBtn.disabled = true;
      rollPopup.textContent = '⚡0';
      nextBtn.disabled = true;
    }

    // ---------- choice handler ----------
    function handleChoice(e) {
      const btn = e.currentTarget;
      if (questionLocked) return;
      if (btn.classList.contains('disabled')) return;
      const isCorrect = btn.dataset.correct === 'true';
      const choiceLetter = btn.textContent.charAt(0);
      speakText(choiceLetter);

      if (!questionLocked) {
        if (selectedTeam === null) {
          selectedTeam = 'boys';
        } else {
          selectedTeam = (selectedTeam === 'boys') ? 'girls' : 'boys';
        }
        if (isCorrect) {
          questionLocked = true;
          clearInterval(timerInterval);
          timerInterval = null;
          highlightCorrect();
          choicesBtns.forEach(b => b.classList.add('disabled'));
          rollBtn.disabled = false;
          speakText('Correct!');
        } else {
          btn.classList.add('wrong-highlight');
          setTimeout(() => btn.classList.remove('wrong-highlight'), 400);
          speakText('Wrong');
        }
      }
    }

    // ---------- roll score ----------
    function rollScore() {
      if (!questionLocked) return;
      if (rollActive) {
        if (rollInterval) {
          clearInterval(rollInterval);
          rollInterval = null;
          rollActive = false;
          const scoreToAdd = currentRollValue;
          if (selectedTeam === 'boys') boysScore += scoreToAdd;
          else if (selectedTeam === 'girls') girlsScore += scoreToAdd;
          else boysScore += scoreToAdd;
          updateScoresUI();
          rollPopup.textContent = `🎯${scoreToAdd}`;
          speakText(`Score added ${scoreToAdd}`);
          nextBtn.disabled = false;
          rollBtn.disabled = true;
        }
        return;
      }

      rollActive = true;
      rollBtn.disabled = false;
      const possibleScores = [1000,2000,3000,4000,5000,-1000,-2000,-3000,-5000,10000,20000,50000];
      let pool = [...possibleScores];
      if (currentIndex >= 10) {
        pool = pool.concat([50000,50000,50000]);
      }
      rollInterval = setInterval(() => {
        const rand = pool[Math.floor(Math.random() * pool.length)];
        currentRollValue = rand;
        rollPopup.textContent = `🎲${rand}`;
      }, 120);
    }

    function nextQuestion() {
      if (nextBtn.disabled) return;
      if (rollInterval) { clearInterval(rollInterval); rollInterval = null; rollActive = false; }
      currentIndex = (currentIndex + 1) % questions.length;
      loadQuestion(currentIndex);
      rollPopup.textContent = '⚡0';
      rollBtn.disabled = true;
      nextBtn.disabled = true;
    }

    // ---------- bind events ----------
    choicesBtns.forEach(btn => btn.addEventListener('click', handleChoice));
    rollBtn.addEventListener('click', rollScore);
    nextBtn.addEventListener('click', nextQuestion);

    loadQuestion(0);
    updateScoresUI();
    nextBtn.disabled = true;
  })();
</script>
</body>
</html>
